    settimane:[
      {num:1,cardio:'30 min LISS (60-70% FC max) + 10 min HIIT 30/30, RPE 5-7.',forza:'Upper/Lower split: 4 esercizi × 4 giri × 10-12 rip. Recupero 45s.',note:'Settimana baseline — registrare i carichi.'},
      {num:2,cardio:'35 min cardio + 15 min HIIT (40/20), RPE 6-7.',forza:'Aumentare carico +5-10%. Aggiungere esercizio accessorio per gruppo.',note:'Progressione lineare del carico.'},
      {num:3,cardio:'40 min cardio. 2 sessioni HIIT dedicate (20 min, 30/15).',forza:'Volume alto: 5 giri × 8-10 rip. Compound: stacco, panca.',note:'Monitorare recupero e sonno.'},
      {num:4,cardio:'45 min cardio variato. Prova corsa 5 km se ben tollerato.',forza:'Deload parziale: 3 giri × 12 rip, carico -20%. Lavoro mobilità.',note:'Rivalutare e pianificare prossimo mesociclo.'},
    ],
    sedute:5,minCardio:150,minForza:100,kcal:2100,prot:168,carbo:220,grassi:70,
  },
};

// ── WIZARD VALUTAZIONE 20 MIN ─────────────────────────────────────────────────
// Definito FUORI dal wizard — evita re-mount ad ogni keystroke
function WizIn({lbl,name,type='text',val,onChange,opts,ph}){
  return(
    <div style={{marginBottom:10}}>
      <label style={S.label}>{lbl}</label>
      {opts
        ?<select value={val||''} onChange={onChange} style={S.sel}>{opts.map(o=><option key={o}>{o}</option>)}</select>
        :<input type={type} value={val||''} onChange={onChange} placeholder={ph} style={S.inp}/>}
    </div>
  );
}

function WizardValutazione({onSave,onClose}){
  const TOTAL=6;
  const [step,setStep]=useState(1);
  const [d,setD]=useState({nome:'',cognome:'',ddn:'',sesso:'F',altezza:'',peso:'',vita:'',pa:'',fc:'',patologie:'Nessuna',farmaci:'Nessuno',sintomiSforzo:'NO',attivita:'Sedentaria',obiettivo:'',mwtDist:'',mwtRpe:'',mwtSintomi:'NO',stsRip:'',stsNote:'',rpeRiposo:'',noteVal:''});
  const upd=k=>e=>setD(x=>({...x,[k]:e.target.value}));
  const set=(k,v)=>setD(x=>({...x,[k]:v}));

  const bmiVal=d.peso&&d.altezza?bmi(+d.peso,+d.altezza):null;
  const {l:bmiLbl,c:bmiClr}=bmiVal?bmiCat(bmiVal):{l:'—',c:C.muted};
  const pr=profilo(+d.mwtDist,+d.stsRip);
  const prog=pr?PROGRAMMI[pr.code]:null;
  const annoNascita=(()=>{if(!d.ddn)return null;const p=d.ddn.split('/');if(p.length===3&&p[2]&&p[2].length===4){const y=+p[2];if(y>1900&&y<2100)return y;}return null;})();
  const fcMax=annoNascita?220-(new Date().getFullYear()-annoNascita):null;
  const pesoTarget=d.altezza?(24.9*(+d.altezza/100)**2).toFixed(1):null;

  const exportPDF=()=>{
    if(!prog||!pr)return;
    const html=`<!DOCTYPE html><html><head><meta charset="utf-8"/><title>Valutazione ${d.nome} ${d.cognome}</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Arial,sans-serif;color:#1e293b;font-size:13px}
.pg{max-width:800px;margin:0 auto;padding:40px}.hdr{display:flex;justify-content:space-between;border-bottom:3px solid #3b82f6;padding-bottom:16px;margin-bottom:22px}
.brand{font-size:22px;font-weight:900;color:#3b82f6}small{display:block;font-size:10px;color:#64748b;letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.sec{margin-bottom:20px}.st{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#3b82f6;border-bottom:1px solid #e2e8f0;padding-bottom:4px;margin-bottom:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.row{display:flex;justify-content:space-between;padding:5px 9px;background:#f8fafc;border-radius:5px;margin-bottom:4px}
.rl{color:#64748b;font-size:12px}.rv{font-weight:600;font-size:12px}
.kpi{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px;text-align:center}
.kv{font-size:22px;font-weight:900;color:#3b82f6}.kl{font-size:9px;color:#64748b;text-transform:uppercase;margin-top:2px}
.profilo{text-align:center;padding:24px;border-radius:14px;margin-bottom:20px}
.A{background:#fee2e2;border:2px solid #ef4444}.B{background:#fef3c7;border:2px solid #f59e0b}.C{background:#d1fae5;border:2px solid #10b981}
.wk{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:8px}
.wk-t{font-size:11px;font-weight:700;color:#3b82f6;margin-bottom:6px}
.tip{background:#fffbeb;border-left:3px solid #f59e0b;padding:7px 10px;font-size:11px;color:#92400e;border-radius:0 5px 5px 0;margin-top:6px}
footer{margin-top:32px;padding-top:12px;border-top:1px solid #e2e8f0;display:flex;justify-content:space-between;font-size:10px;color:#94a3b8}
@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style></head>
<body><div class="pg">
<div class="hdr">
  <div><div class="brand">PT Board<small>Valutazione Base — 20 min</small></div><div style="font-size:11px;color:#64748b;margin-top:8px">Data: ${fmtDate()}</div></div>
  <div style="text-align:right"><div style="font-size:20px;font-weight:800">${d.nome} ${d.cognome}</div><div style="font-size:11px;color:#64748b">${d.ddn||''} · ${d.sesso}</div></div>
</div>
<div class="profilo ${pr.code}">
  <div style="font-size:60px;font-weight:900;color:${pr.c};line-height:1">${pr.code}</div>
  <div style="font-size:16px;font-weight:700;margin-top:6px">${pr.l}</div>
  <div style="font-size:12px;color:#475569;margin-top:4px">${prog.desc}</div>
</div>
<div class="g3" style="margin-bottom:20px">
  <div class="kpi"><div class="kv">${bmiVal||'—'}</div><div class="kl">BMI · ${bmiLbl}</div></div>
  <div class="kpi"><div class="kv">${d.peso||'—'} kg</div><div class="kl">Peso attuale</div></div>
  <div class="kpi"><div class="kv">${pesoTarget||'—'} kg</div><div class="kl">Peso target</div></div>
</div>
<div class="g2" style="margin-bottom:20px">
<div class="sec"><div class="st">Anagrafica & Clinica</div>
${[['Altezza',d.altezza?d.altezza+' cm':'—'],['Vita',d.vita?d.vita+' cm':'—'],['PA',d.pa||'—'],['FC riposo',d.fc?d.fc+' bpm':'—'],['FC max',fcMax?fcMax+' bpm':'—'],['FC target 75%',fcMax?Math.round(fcMax*.75)+' bpm':'—'],['Patologie',d.patologie||'—'],['Farmaci',d.farmaci||'—'],['Attività',d.attivita||'—'],['Obiettivo',d.obiettivo||'—']].map(([k,v])=>`<div class="row"><span class="rl">${k}</span><span class="rv">${v}</span></div>`).join('')}
</div>
<div class="sec"><div class="st">Test Funzionali</div>
${[['6MWT — Distanza',d.mwtDist?d.mwtDist+' m':'—'],['6MWT — RPE',d.mwtRpe||'—'],['6MWT — Sintomi',d.mwtSintomi||'—'],['STS 30s — Rip.',d.stsRip||'—'],['Note STS',d.stsNote||'—'],['RPE a riposo',d.rpeRiposo||'—'],['Note valutazione',d.noteVal||'—']].map(([k,v])=>`<div class="row"><span class="rl">${k}</span><span class="rv">${v}</span></div>`).join('')}
</div></div>
<div class="sec"><div class="st">${prog.nome}</div>
<div class="g3" style="margin-bottom:12px">
  <div class="kpi"><div class="kv" style="font-size:18px">${prog.sedute}</div><div class="kl">Sedute/sett.</div></div>
  <div class="kpi"><div class="kv" style="font-size:18px">${prog.minCardio}'</div><div class="kl">Min cardio</div></div>
  <div class="kpi"><div class="kv" style="font-size:18px">${prog.minForza}'</div><div class="kl">Min forza</div></div>
</div>
${prog.settimane.map(w=>`<div class="wk"><div class="wk-t">SETTIMANA ${w.num}</div>
<div style="margin-bottom:3px"><strong style="color:#3b82f6">Cardio:</strong> ${w.cardio}</div>
<div><strong style="color:#10b981">Forza:</strong> ${w.forza}</div>
<div class="tip">💡 ${w.note}</div></div>`).join('')}
</div>
<div class="sec"><div class="st">Linee guida nutrizionali</div>
<div class="g4">
  <div class="kpi"><div class="kv" style="font-size:16px;color:#fb923c">${prog.kcal}</div><div class="kl">kcal/gg</div></div>
  <div class="kpi"><div class="kv" style="font-size:16px">${prog.prot}g</div><div class="kl">Proteine</div></div>
  <div class="kpi"><div class="kv" style="font-size:16px;color:#f59e0b">${prog.carbo}g</div><div class="kl">Carboidrati</div></div>
  <div class="kpi"><div class="kv" style="font-size:16px;color:#10b981">${prog.grassi}g</div><div class="kl">Grassi</div></div>
</div></div>
<footer><span>PT Board · Valutazione Base 20 min · ${fmtDate()}</span><span>${d.nome} ${d.cognome} — Profilo ${pr.code}</span></footer>
</div></body></html>`;
    const w=window.open('','_blank');w.document.write(html);w.document.close();setTimeout(()=>w.print(),600);
  };

  const exportCSV=()=>{
    if(!prog||!pr)return;
    const rows=[
      ['PT Board — Valutazione Base 20 min',''],['Data',fmtDate()],[''],
      ['PAZIENTE',''],['Cognome',d.cognome],['Nome',d.nome],['Data nascita',d.ddn],['Sesso',d.sesso],
      ['Altezza cm',d.altezza],['Peso kg',d.peso],['Vita cm',d.vita],['PA',d.pa],['FC riposo bpm',d.fc],
      ['FC max bpm',fcMax||''],['BMI',bmiVal||''],['Categoria BMI',bmiLbl],['Peso target kg',pesoTarget||''],
      ['Patologie',d.patologie],['Farmaci',d.farmaci],['Attività',d.attivita],['Obiettivo',d.obiettivo],[''],
      ['TEST FUNZIONALI',''],['6MWT Distanza m',d.mwtDist],['6MWT RPE',d.mwtRpe],['6MWT Sintomi',d.mwtSintomi],
      ['STS 30s Ripetizioni',d.stsRip],['Note STS',d.stsNote],['RPE riposo',d.rpeRiposo],['Note valutazione',d.noteVal],[''],
      ['PROFILO',''],['Codice',pr.code],['Descrizione',pr.l],[''],
      ['PROGRAMMA 4 SETTIMANE',''],['Nome',prog.nome],['Sedute/sett',prog.sedute],['Min cardio/sett',prog.minCardio],['Min forza/sett',prog.minForza],[''],
      ['SETTIMANA','CARDIO','FORZA','NOTE'],
      ...prog.settimane.map(w=>[`Settimana ${w.num}`,w.cardio,w.forza,w.note]),[''],
      ['NUTRIZIONE',''],['kcal/gg',prog.kcal],['Proteine g',prog.prot],['Carboidrati g',prog.carbo],['Grassi g',prog.grassi],
    ];
    const csv=rows.map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
    a.download=`Valutazione_${d.cognome}_${d.nome}_${fmtDate().replace(/\//g,'-')}.csv`;
    a.click();
  };

  const OL={position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:12};
  const BOX={background:C.card,border:`1px solid ${C.border2}`,borderRadius:18,width:'min(800px,98vw)',maxHeight:'94vh',display:'flex',flexDirection:'column'};
  const pct=Math.round(step/TOTAL*100);
  const clr=pr?pr.c:C.blue;

  const stepTitles=['Anagrafica & Clinica','🚶 6 Minute Walk Test','🪑 Sit-to-Stand 30s','😮‍💨 RPE & Note finali','📊 Classificazione','🏆 Programma 4 Settimane'];
  const stepSub=['Dati base — ~5 min','Test 1 di 3 — ~8 min','Test 2 di 3 — ~5 min','Test 3 di 3 — ~2 min','Risultato automatico','Pronto per iniziare'];

  return(
    <div style={OL} onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={BOX}>
        {/* Header */}
        <div style={{padding:'18px 22px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
          <div style={{width:38,height:38,borderRadius:10,background:C.blue+'20',border:`1px solid ${C.blue}40`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>🎯</div>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:800,color:C.strong}}>Valutazione Base — 20 minuti</div>
            <div style={{fontSize:11,color:C.muted,marginTop:1}}>Passo {step} di {TOTAL} · {stepTitles[step-1]}</div>
          </div>
          <button onClick={onClose} style={{background:'transparent',border:'none',cursor:'pointer',color:C.muted,fontSize:20,padding:'4px 8px',borderRadius:6,lineHeight:1}}>✕</button>
        </div>
        {/* Progress */}
        <div style={{height:3,background:C.border,flexShrink:0}}>
          <div style={{height:'100%',width:pct+'%',background:`linear-gradient(90deg,${C.blue},${C.green})`,transition:'width .4s ease'}}/>
        </div>
        {/* Step pills */}
        <div style={{display:'flex',padding:'10px 22px',gap:4,flexShrink:0,overflowX:'auto'}}>
          {stepTitles.map((t,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
              <div style={{width:22,height:22,borderRadius:'50%',background:i<step-1?C.green:i===step-1?C.blue:C.border2,color:i<=step-1?'#fff':C.muted,fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',cursor:i<step?'pointer':'default',transition:'all .2s'}}
                onClick={()=>{if(i<step)setStep(i+1);}}>
                {i<step-1?'✓':i+1}
              </div>
              {i<TOTAL-1&&<div style={{width:20,height:1,background:i<step-1?C.green:C.border2}}/>}
            </div>
          ))}
        </div>

        {/* Body */}
        <div style={{padding:'20px 24px',flex:1,overflowY:'auto'}}>
          <div style={{fontSize:10,color:C.blue,fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>{stepSub[step-1]}</div>
          <h2 style={{fontSize:19,fontWeight:800,color:C.strong,marginBottom:16}}>{stepTitles[step-1]}</h2>

          {/* STEP 1 — Anagrafica */}
          {step===1&&<div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 12px'}}>
              <WizIn lbl="Cognome *" name="cognome" val={d.cognome} onChange={upd('cognome')}/>
              <WizIn lbl="Nome *" name="nome" val={d.nome} onChange={upd('nome')}/>
              <WizIn lbl="Data nascita" name="ddn" val={d.ddn} ph="GG/MM/AAAA" onChange={upd('ddn')}/>
              <WizIn lbl="Sesso" name="sesso" val={d.sesso} opts={['F','M']} onChange={upd('sesso')}/>
              <WizIn lbl="Altezza (cm)" name="altezza" type="number" val={d.altezza} onChange={upd('altezza')}/>
              <WizIn lbl="Peso (kg)" name="peso" type="number" val={d.peso} onChange={upd('peso')}/>
              <WizIn lbl="Vita (cm)" name="vita" type="number" val={d.vita} onChange={upd('vita')}/>
              <WizIn lbl="PA (es. 120/80)" name="pa" val={d.pa} onChange={upd('pa')}/>
              <WizIn lbl="FC riposo (bpm)" name="fc" type="number" val={d.fc} onChange={upd('fc')}/>
              <WizIn lbl="Patologie note" name="patologie" val={d.patologie} onChange={upd('patologie')}/>
              <WizIn lbl="Farmaci" name="farmaci" val={d.farmaci} onChange={upd('farmaci')}/>
              <WizIn lbl="Sintomi da sforzo" name="sintomiSforzo" val={d.sintomiSforzo} opts={['NO','Dispnea','Dolore toracico','Vertigini','Altro']} onChange={upd('sintomiSforzo')}/>
              <WizIn lbl="Attività attuale" name="attivita" val={d.attivita} opts={['Sedentaria','Poco attiva','Moderatamente attiva','Attiva']} onChange={upd('attivita')}/>
            </div>
            <WizIn lbl="Obiettivo principale" name="obiettivo" val={d.obiettivo} ph="es. Dimagrimento, migliorare salute..." onChange={upd('obiettivo')}/>
            {bmiVal&&<div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginTop:10}}>
              {[[bmiVal,`BMI — ${bmiLbl}`,bmiClr],[`${d.peso} kg`,'Peso attuale',C.text],[`${pesoTarget||'—'} kg`,'Peso target (BMI 24.9)',C.blue]].map(([v,l,c])=>(
                <div key={l} style={{background:C.bg,border:`1px solid ${c}30`,borderRadius:10,padding:'10px 14px',textAlign:'center'}}>
                  <div style={{fontSize:20,fontWeight:900,color:c}}>{v}</div>
                  <div style={{fontSize:10,color:C.muted,marginTop:3}}>{l}</div>
                </div>
              ))}
            </div>}
            {fcMax&&<div style={{background:C.bg,border:`1px solid ${C.purple}30`,borderRadius:10,padding:'10px 14px',marginTop:10,display:'flex',gap:20,justifyContent:'center'}}>
              <div style={{textAlign:'center'}}><div style={{fontSize:20,fontWeight:900,color:C.purple}}>{fcMax}</div><div style={{fontSize:10,color:C.muted}}>FC max</div></div>
              <div style={{textAlign:'center'}}><div style={{fontSize:20,fontWeight:900,color:C.blue}}>{Math.round(fcMax*.6)}</div><div style={{fontSize:10,color:C.muted}}>60% FC max</div></div>
              <div style={{textAlign:'center'}}><div style={{fontSize:20,fontWeight:900,color:C.teal}}>{Math.round(fcMax*.75)}</div><div style={{fontSize:10,color:C.muted}}>75% FC max</div></div>
            </div>}
          </div>}

          {/* STEP 2 — 6MWT */}
          {step===2&&<div>
            <div style={{background:C.bg,border:`1px solid ${C.border2}`,borderRadius:12,padding:14,marginBottom:16}}>
              <div style={{fontSize:12,fontWeight:700,color:C.blue,marginBottom:8}}>📋 Protocollo rapido</div>
              {['Corridoio piano ≥ 20m (o circuito all\'aperto)','Il paziente cammina il più veloce possibile per 6 minuti esatti','Può fermarsi se necessario — registrare le soste','Misurare la distanza totale in metri','Rilevare RPE (0-10) subito al termine'].map((t,i)=>(
                <div key={i} style={{display:'flex',gap:8,marginBottom:7}}>
                  <div style={{width:18,height:18,borderRadius:'50%',background:C.blue+'25',color:C.blue,fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>{i+1}</div>
                  <div style={{fontSize:13,color:C.text,lineHeight:1.5}}>{t}</div>
                </div>
              ))}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 12px'}}>
              <WizIn lbl="Distanza percorsa (m) *" name="mwtDist" type="number" val={d.mwtDist} ph="es. 320" onChange={upd('mwtDist')}/>
              <WizIn lbl="RPE al termine (0-10)" name="mwtRpe" type="number" val={d.mwtRpe} ph="0 = nessuno sforzo" onChange={upd('mwtRpe')}/>
            </div>
            <WizIn lbl="Sintomi durante il test" name="mwtSintomi" val={d.mwtSintomi} opts={['NO','Dispnea lieve','Dispnea moderata','Affaticamento gambe','Dolore','Test interrotto']} onChange={upd('mwtSintomi')}/>
            {d.mwtDist&&<div style={{background:C.bg,border:`1px solid ${+d.mwtDist<300?C.red:+d.mwtDist<=450?C.yellow:C.green}40`,borderRadius:10,padding:'10px 14px',marginTop:4}}>
              <div style={{fontSize:10,color:C.muted}}>Indicatore 6MWT</div>
              <div style={{fontSize:15,fontWeight:700,color:+d.mwtDist<300?C.red:+d.mwtDist<=450?C.yellow:C.green,marginTop:3}}>
                {+d.mwtDist<300?'< 300m — Capacità molto bassa → Profilo A tendenziale':+d.mwtDist<=450?'300–450m — Capacità moderata → Profilo B tendenziale':'> 450m — Buona capacità → Profilo C tendenziale'}
              </div>
            </div>}
          </div>}

          {/* STEP 3 — STS */}
          {step===3&&<div>
            <div style={{background:C.bg,border:`1px solid ${C.border2}`,borderRadius:12,padding:14,marginBottom:16}}>
              <div style={{fontSize:12,fontWeight:700,color:C.green,marginBottom:8}}>📋 Protocollo rapido</div>
              {['Sedia standard senza braccioli, altezza ~43 cm','Partenza seduto, braccia incrociate al petto','Al via: alzarsi completamente e risedersi per 30 secondi esatti','Contare ogni alzata completa come 1 ripetizione','Non usare le mani — annotarlo se indispensabile'].map((t,i)=>(
                <div key={i} style={{display:'flex',gap:8,marginBottom:7}}>
                  <div style={{width:18,height:18,borderRadius:'50%',background:C.green+'25',color:C.green,fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>{i+1}</div>
                  <div style={{fontSize:13,color:C.text,lineHeight:1.5}}>{t}</div>
                </div>
              ))}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 12px'}}>
              <WizIn lbl="Ripetizioni completate *" name="stsRip" type="number" val={d.stsRip} ph="es. 12" onChange={upd('stsRip')}/>
              <WizIn lbl="Note tecnica" name="stsNote" val={d.stsNote} ph="es. Uso mani, ginocchia valghe..." onChange={upd('stsNote')}/>
            </div>
            {d.stsRip&&<div style={{background:C.bg,border:`1px solid ${+d.stsRip<10?C.red:+d.stsRip<=15?C.yellow:C.green}40`,borderRadius:10,padding:'10px 14px',marginTop:4}}>
              <div style={{fontSize:10,color:C.muted}}>Indicatore STS</div>
              <div style={{fontSize:15,fontWeight:700,color:+d.stsRip<10?C.red:+d.stsRip<=15?C.yellow:C.green,marginTop:3}}>
                {+d.stsRip<10?'< 10 rip. — Forza molto ridotta → Profilo A tendenziale':+d.stsRip<=15?'10–15 rip. — Forza moderata → Profilo B tendenziale':'> 15 rip. — Buona forza → Profilo C tendenziale'}
              </div>
            </div>}
            {d.mwtDist&&d.stsRip&&pr&&<div style={{background:`${pr.c}12`,border:`1px solid ${pr.c}40`,borderRadius:10,padding:'10px 14px',marginTop:10,display:'flex',alignItems:'center',gap:10}}>
              <div style={{fontSize:30,fontWeight:900,color:pr.c,width:40,textAlign:'center'}}>{pr.code}</div>
              <div><div style={{fontSize:13,fontWeight:700,color:C.strong}}>Profilo {pr.code} già determinabile</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{pr.l}</div></div>
            </div>}
          </div>}

          {/* STEP 4 — RPE & Note */}
          {step===4&&<div>
            <p style={{fontSize:13,color:C.muted,marginBottom:16,lineHeight:1.6}}>Valuta lo stato percepito <strong style={{color:C.text}}>dopo i test</strong>, a riposo. Registra osservazioni cliniche utili per il futuro.</p>
            <div style={{fontSize:12,fontWeight:700,color:C.purple,marginBottom:8}}>Scala RPE — clicca per selezionare</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:6,marginBottom:14}}>
              {[[0,'#10b981','Nulla'],[2,'#22d3ee','Molto lieve'],[4,'#f59e0b','Lieve'],[6,'#fb923c','Moderata'],[8,'#ef4444','Intensa']].map(([v,c,l])=>(
                <div key={v} onClick={()=>set('rpeRiposo',String(v))} style={{background:String(d.rpeRiposo)===String(v)?c+'30':C.bg,border:`1px solid ${String(d.rpeRiposo)===String(v)?c:C.border2}`,borderRadius:8,padding:'8px 4px',textAlign:'center',cursor:'pointer',transition:'all .15s'}}>
                  <div style={{fontSize:18,fontWeight:800,color:c}}>{v}</div>
                  <div style={{fontSize:9,color:C.muted,marginTop:2}}>{l}</div>
                </div>
              ))}
            </div>
            <WizIn lbl="RPE a riposo (0-10)" name="rpeRiposo" type="number" val={d.rpeRiposo} ph="0-10" onChange={upd('rpeRiposo')}/>
            <div style={{marginBottom:10}}>
              <label style={S.label}>Note generali valutazione</label>
              <textarea value={d.noteVal||''} onChange={upd('noteVal')} placeholder="Osservazioni cliniche, comportamento durante i test, motivazione, note utili per il programma..." style={{...S.ta,minHeight:90}}/>
            </div>
          </div>}

          {/* STEP 5 — Classificazione */}
          {step===5&&<div>
            {!pr?<div style={{background:C.bg,border:`1px dashed ${C.border2}`,borderRadius:12,padding:28,textAlign:'center',color:C.muted}}>
              <div style={{fontSize:32,marginBottom:8}}>⚠️</div>
              <div style={{fontSize:14}}>Inserisci i valori del 6MWT (passo 2) e STS (passo 3) per ottenere la classificazione automatica.</div>
            </div>:<>
              <div style={{background:`${pr.c}12`,border:`2px solid ${pr.c}50`,borderRadius:16,padding:28,textAlign:'center',marginBottom:18}}>
                <div style={{fontSize:80,fontWeight:900,color:pr.c,lineHeight:1}}>{pr.code}</div>
                <div style={{fontSize:18,fontWeight:700,color:C.strong,marginTop:8}}>{pr.l}</div>
                <div style={{fontSize:13,color:C.muted,marginTop:6,maxWidth:400,margin:'8px auto 0'}}>{prog?.desc}</div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
                {[[`6MWT: ${d.mwtDist||'—'} m`,+d.mwtDist<300?C.red:+d.mwtDist<=450?C.yellow:C.green],[`STS: ${d.stsRip||'—'} rip.`,+d.stsRip<10?C.red:+d.stsRip<=15?C.yellow:C.green],[`BMI: ${bmiVal||'—'} — ${bmiLbl}`,bmiClr],[`Peso target: ${pesoTarget||'—'} kg`,C.blue]].map(([l,c])=>(
                  <div key={l} style={{background:C.bg,border:`1px solid ${c}30`,borderRadius:10,padding:'10px 14px'}}>
                    <div style={{fontSize:13,fontWeight:700,color:c}}>{l}</div>
                  </div>
                ))}
              </div>
              <div style={{background:C.bg,border:`1px solid ${C.border2}`,borderRadius:12,padding:14}}>
                <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:1,color:C.muted,marginBottom:8}}>Criteri di classificazione automatica</div>
                {[['A',C.red,'6MWT < 300m  e/o  STS < 10 rip.','Avvio molto graduale — priorità sicurezza'],['B',C.yellow,'6MWT 300-450m  e  STS 10-15 rip.','Progressione moderata e controllata'],['C',C.green,'6MWT > 450m  e  STS > 15 rip.','Progressione più intensa — focus composizione']].map(([p,c,v,desc])=>(
                  <div key={p} style={{display:'flex',gap:10,alignItems:'center',padding:'8px 0',borderBottom:`1px solid ${C.border}`}}>
                    <div style={{width:28,height:28,borderRadius:8,background:c+'20',border:`1px solid ${c}40`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:900,color:c,flexShrink:0}}>{p}</div>
                    <div><div style={{fontSize:12,fontWeight:700,color:C.text}}>{v}</div><div style={{fontSize:11,color:C.muted}}>{desc}</div></div>
                  </div>
                ))}
              </div>
            </>}
          </div>}

          {/* STEP 6 — Programma + Export */}
          {step===6&&<div>
            {!prog?<div style={{background:C.bg,border:`1px dashed ${C.border2}`,borderRadius:12,padding:28,textAlign:'center',color:C.muted}}>
              <div style={{fontSize:32,marginBottom:8}}>⚠️</div>
              <div style={{fontSize:14}}>Completa i test funzionali per ricevere il programma automatico.</div>
            </div>:<>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:16}}>
                {[[prog.sedute,'Sedute/sett.',C.blue],[prog.minCardio+"'",'Min cardio/sett.',C.green],[prog.minForza+"'",'Min forza/sett.',C.orange]].map(([v,l,c])=>(
                  <div key={l} style={{background:C.bg,border:`1px solid ${c}30`,borderRadius:12,padding:'12px 8px',textAlign:'center'}}>
                    <div style={{fontSize:24,fontWeight:900,color:c}}>{v}</div>
                    <div style={{fontSize:10,color:C.muted,textTransform:'uppercase',marginTop:4}}>{l}</div>
                  </div>
                ))}
              </div>
              {prog.settimane.map(w=>(
                <div key={w.num} style={{...S.card,marginBottom:10,borderLeft:`3px solid ${C.blue}`}}>
                  <div style={{fontSize:10,fontWeight:700,color:C.blue,textTransform:'uppercase',letterSpacing:1,marginBottom:10}}>Settimana {w.num}</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                    <div><div style={{fontSize:9,color:C.green,fontWeight:700,textTransform:'uppercase',marginBottom:4}}>Cardio</div><div style={{fontSize:12,color:C.text,lineHeight:1.6}}>{w.cardio}</div></div>
                    <div><div style={{fontSize:9,color:C.purple,fontWeight:700,textTransform:'uppercase',marginBottom:4}}>Forza</div><div style={{fontSize:12,color:C.text,lineHeight:1.6}}>{w.forza}</div></div>
                  </div>
                  <div style={{marginTop:8,background:C.yellow+'10',border:`1px solid ${C.yellow}30`,borderRadius:7,padding:'6px 10px',fontSize:12,color:C.yellow}}>💡 {w.note}</div>
                </div>
              ))}
              <div style={{...S.card,marginBottom:14}}>
                <div style={S.st}>🥗 Linee guida nutrizionali</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
                  {[[prog.kcal,'kcal/gg',C.orange],[prog.prot+'g','Proteine',C.blue],[prog.carbo+'g','Carboidrati',C.yellow],[prog.grassi+'g','Grassi',C.green]].map(([v,l,c])=>(
                    <div key={l} style={{background:C.bg,borderRadius:9,padding:'10px 6px',textAlign:'center',border:`1px solid ${c}30`}}>
                      <div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div>
                      <div style={{fontSize:9,color:C.muted,marginTop:2}}>{l}</div>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{display:'flex',gap:10}}>
                <button onClick={exportPDF} style={{...S.btn('success'),flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>📄 Esporta PDF</button>
                <button onClick={exportCSV} style={{...S.btn('purple'),flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>📊 Esporta Excel / CSV</button>
              </div>
            </>}
          </div>}
        </div>

        {/* Footer */}
        <div style={{padding:'14px 22px',borderTop:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0,gap:8,flexWrap:'wrap'}}>
          <button onClick={onClose} style={S.btn('ghost',true)}>Annulla</button>
          <div style={{display:'flex',gap:8}}>
            {step>1&&<button onClick={()=>setStep(s=>s-1)} style={S.btn('ghost',true)}>← Indietro</button>}
            {step<TOTAL&&<button onClick={()=>{
              if(step===1&&(!d.nome.trim()||!d.cognome.trim())){alert('Inserisci nome e cognome per continuare.');return;}
              setStep(s=>s+1);
            }} style={S.btn()}>Avanti →</button>}
            {step===TOTAL&&<button onClick={()=>{
              if(!d.nome.trim()||!d.cognome.trim()){alert('Dati incompleti — torna al passo 1.');return;}
              const p={nome:d.nome,cognome:d.cognome,ddn:d.ddn,annoNascita:annoNascita||'',altezza:d.altezza,peso:d.peso,vita:d.vita,pa:d.pa,fc:d.fc,patologie:d.patologie,farmaci:d.farmaci,sintomiSforzo:d.sintomiSforzo,allergie:'',attivita:d.attivita,obiettivo:d.obiettivo,preferenze:'',stressPercepito:'Medio',sonno:'',dataValutazione:fmtDate(),
                test:{mwtDist:d.mwtDist,mwtRpe:d.mwtRpe,mwtSintomi:d.mwtSintomi,stsRip:d.stsRip,stsNote:d.stsNote,noteVal:d.noteVal},
                programma:prog?{dataInizio:fmtDate(),sedute:String(prog.sedute),minCardio:String(prog.minCardio),minForza:String(prog.minForza),cardio:prog.settimane[0].cardio,forza:prog.settimane[0].forza,note:prog.settimane[0].note}:{},
                nutrizione:prog?{kcal:String(prog.kcal),proteine:String(prog.prot),carboidrati:String(prog.carbo),grassi:String(prog.grassi),note:'',pianoPasti:''}:{},
              };
              onSave(p);
            }} style={{...S.btn(),background:C.green,display:'flex',alignItems:'center',gap:6}}>✓ Salva &amp; apri scheda</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── ERROR BOUNDARY ────────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  render(){
    if(this.state.err) return(
      <div style={{padding:24,background:'#07090f',minHeight:'100vh',color:'#e2e8f0',fontFamily:'monospace'}}>
        <div style={{fontSize:20,fontWeight:700,color:'#ef4444',marginBottom:12}}>⚠ Errore app</div>
        <div style={{fontSize:12,color:'#94a3b8',wordBreak:'break-all',whiteSpace:'pre-wrap'}}>{String(this.state.err)}</div>
        <button onClick={()=>window.location.reload()} style={{marginTop:20,padding:'10px 20px',background:'#3b82f6',color:'#fff',border:'none',borderRadius:8,fontSize:14,cursor:'pointer'}}>Ricarica</button>
      </div>
    );
    return this.props.children;
  }
}

// ── AUTH SCREEN ───────────────────────────────────────────────────────────────
function AuthScreen(){
  const [mode,setMode]=useState('login');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [pw2,setPw2]=useState('');
  const [nome,setNome]=useState('');
  const [err,setErr]=useState('');
  const [msg,setMsg]=useState('');
  const [loading,setLoading]=useState(false);

  const errMap=(code)=>{
    if(code==='auth/user-not-found'||code==='auth/wrong-password'||code==='auth/invalid-credential') return 'Email o password errati';
    if(code==='auth/email-already-in-use') return 'Email già registrata';
    if(code==='auth/weak-password') return 'Password troppo corta (minimo 6 caratteri)';
    if(code==='auth/invalid-email') return 'Email non valida';
    return 'Errore. Riprova.';
  };

  const doLogin=async()=>{setErr('');setLoading(true);try{await fbAuth.signInWithEmailAndPassword(email,pw);}catch(e){setErr(errMap(e.code));}setLoading(false);};
  const doRegister=async()=>{setErr('');if(pw!==pw2){setErr('Le password non coincidono');return;}if(!nome.trim()){setErr('Inserisci il tuo nome');return;}setLoading(true);try{const c=await fbAuth.createUserWithEmailAndPassword(email,pw);await c.user.updateProfile({displayName:nome});}catch(e){setErr(errMap(e.code));}setLoading(false);};
  const doReset=async()=>{setErr('');setLoading(true);try{await fbAuth.sendPasswordResetEmail(email);setMsg('Email di recupero inviata!');}catch(e){setErr(errMap(e.code));}setLoading(false);};

  const inp={width:'100%',padding:'11px 14px',borderRadius:9,border:'1px solid #334155',background:'#0f172a',color:'#e2e8f0',fontSize:14,fontFamily:'inherit',outline:'none',marginBottom:10};
  const btn={width:'100%',padding:'12px',borderRadius:9,border:'none',background:'#3b82f6',color:'#fff',fontSize:14,fontWeight:700,cursor:loading?'not-allowed':'pointer',fontFamily:'inherit',marginBottom:8,opacity:loading?0.6:1};

  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'#07090f',padding:20}}>
      <div style={{width:'100%',maxWidth:400}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{fontSize:32,fontWeight:900,color:'#3b82f6',marginBottom:6}}>PT Board</div>
          <div style={{fontSize:13,color:'#64748b'}}>Gestione pazienti per Personal Trainer</div>
        </div>
        <div style={{background:'#0f1623',border:'1px solid #1e2d47',borderRadius:14,padding:28}}>
          {mode!=='reset'&&(
            <div style={{display:'flex',gap:4,background:'#080d1a',borderRadius:9,padding:4,marginBottom:22}}>
              {[['login','Accedi'],['register','Registrati']].map(([m,l])=>(
                <button key={m} onClick={()=>{setMode(m);setErr('');setMsg('');}} style={{flex:1,padding:'8px',borderRadius:7,border:'none',background:mode===m?'#3b82f6':'transparent',color:mode===m?'#fff':'#64748b',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit',transition:'all .2s'}}>{l}</button>
              ))}
            </div>
          )}
          {mode==='reset'&&(
            <div style={{marginBottom:16}}>
              <button onClick={()=>{setMode('login');setErr('');setMsg('');}} style={{background:'none',border:'none',color:'#64748b',cursor:'pointer',fontSize:13,fontFamily:'inherit',padding:0}}>← Torna al login</button>
              <div style={{fontSize:18,fontWeight:800,color:'#f8fafc',marginTop:8}}>Recupera password</div>
            </div>
          )}
          {mode==='register'&&<input style={inp} placeholder="Il tuo nome" value={nome} onChange={e=>setNome(e.target.value)}/>}
          <input style={inp} placeholder="Email" type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&(mode==='login'?doLogin():mode==='register'?doRegister():doReset())}/>
          {mode!=='reset'&&<input style={inp} placeholder="Password" type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&(mode==='login'?doLogin():doRegister())}/>}
          {mode==='register'&&<input style={inp} placeholder="Conferma password" type="password" value={pw2} onChange={e=>setPw2(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doRegister()}/>}
          {err&&<div style={{background:'#ef444415',border:'1px solid #ef444430',borderRadius:8,padding:'9px 13px',fontSize:12,color:'#ef4444',marginBottom:10}}>{err}</div>}
          {msg&&<div style={{background:'#10b98115',border:'1px solid #10b98130',borderRadius:8,padding:'9px 13px',fontSize:12,color:'#10b981',marginBottom:10}}>{msg}</div>}
          {mode==='login'&&<button style={btn} onClick={doLogin} disabled={loading}>{loading?'Accesso...':'Accedi'}</button>}
          {mode==='register'&&<button style={btn} onClick={doRegister} disabled={loading}>{loading?'Registrazione...':'Crea account'}</button>}
          {mode==='reset'&&<button style={btn} onClick={doReset} disabled={loading}>{loading?'Invio...':'Invia email di recupero'}</button>}
          {mode==='login'&&<button onClick={()=>{setMode('reset');setErr('');setMsg('');}} style={{width:'100%',background:'none',border:'none',color:'#64748b',cursor:'pointer',fontSize:12,fontFamily:'inherit',textAlign:'center',padding:'4px 0'}}>Password dimenticata?</button>}
        </div>
        <div style={{textAlign:'center',marginTop:20,fontSize:11,color:'#334155'}}>Dati salvati in modo sicuro su Google Firebase 🔒</div>
      </div>
    </div>
  );
}

function TutorialModal({onClose,isLight}){
  const [cur,setCur]=useState(0);
  const total=TSTEPS.length;
  const s=TSTEPS[cur];
  const OL={position:'fixed',inset:0,background:'rgba(0,0,0,0.88)',zIndex:300,display:'flex',alignItems:'stretch',justifyContent:'center'};
  const BOX={background:C.card,width:'min(900px,100vw)',maxHeight:'100vh',display:'flex',flexDirection:'column'};
  return(
    <div style={OL} onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={BOX}>
        {/* Header */}
        <div style={{padding:'14px 20px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
          <div style={{width:34,height:34,borderRadius:9,background:C.blue+'20',border:`1px solid ${C.blue}30`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>📖</div>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:800,color:C.strong}}>Tutorial PT Board</div>
            <div style={{fontSize:11,color:C.muted,marginTop:1}}>Passo {cur+1} di {total} · {s.label}</div>
          </div>
          <button onClick={onClose} style={{background:'transparent',border:'none',cursor:'pointer',color:C.muted,fontSize:20,padding:'4px 8px',borderRadius:6,lineHeight:1}}>✕</button>
        </div>
        {/* Progress */}
        <div style={{height:3,background:C.border,flexShrink:0}}>
          <div style={{height:'100%',width:((cur+1)/total*100)+'%',background:`linear-gradient(90deg,${C.blue},${C.green})`,transition:'width .4s ease'}}/>
        </div>
        {/* Step pills */}
        <div style={{display:'flex',padding:'10px 20px',gap:3,flexShrink:0,overflowX:'auto',borderBottom:`1px solid ${C.border}`}}>
          {TSTEPS.map((x,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:3,flexShrink:0}}>
              <div onClick={()=>setCur(i)} style={{width:22,height:22,borderRadius:'50%',background:i<cur?C.green:i===cur?C.blue:C.border2,color:i<=cur?'#fff':C.muted,fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'all .2s',flexShrink:0}}>{i<cur?'✓':i+1}</div>
              {i<total-1&&<div style={{width:14,height:1,background:i<cur?C.green:C.border2,flexShrink:0}}/>}
            </div>
          ))}
        </div>
        {/* Body */}
        <div style={{flex:1,overflowY:'auto',padding:'20px'}}>
          <div style={{display:'inline-flex',alignItems:'center',padding:'3px 12px',borderRadius:100,fontSize:10,fontWeight:700,letterSpacing:.8,textTransform:'uppercase',background:s.bc,color:s.bct,marginBottom:14}}>{s.badge}</div>
          <div style={{fontSize:20,fontWeight:800,color:C.strong,letterSpacing:-0.5,marginBottom:8}}>{s.title}</div>
          <div style={{fontSize:13,color:C.muted,lineHeight:1.7,marginBottom:20,fontWeight:300}}>{s.desc}</div>
          <div dangerouslySetInnerHTML={{__html:s.html}}/>
        </div>
        {/* Footer */}
        <div style={{padding:'12px 20px',borderTop:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',flexShrink:0,gap:8}}>
          <button onClick={onClose} style={{padding:'8px 18px',borderRadius:8,border:`1px solid ${C.border2}`,background:'transparent',color:C.muted,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>Chiudi</button>
          <div style={{display:'flex',gap:8}}>
            {cur>0&&<button onClick={()=>setCur(c=>c-1)} style={{padding:'8px 18px',borderRadius:8,border:`1px solid ${C.border2}`,background:'transparent',color:C.muted,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>← Indietro</button>}
            {cur<total-1
              ?<button onClick={()=>setCur(c=>c+1)} style={{padding:'8px 18px',borderRadius:8,border:'none',background:C.blue,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>Avanti →</button>
              :<button onClick={onClose} style={{padding:'8px 18px',borderRadius:8,border:'none',background:C.green,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>✓ Inizia ad usare PT Board</button>
            }
          </div>
        </div>
      </div>
    </div>
  );
}
