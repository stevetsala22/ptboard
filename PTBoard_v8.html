function Avatar({nome='?',cognome='?',size=34}){
  const initials=`${nome[0]||''}${cognome[0]||''}`.toUpperCase();
  const hue=(nome.charCodeAt(0)+cognome.charCodeAt(0))*7%360;
  return <div style={{width:size,height:size,borderRadius:'50%',background:`hsl(${hue},50%,22%)`,border:`2px solid hsl(${hue},50%,38%)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*0.33,fontWeight:700,color:`hsl(${hue},60%,72%)`,flexShrink:0}}>{initials}</div>;
}

function FF({label,name,value,onChange,type='text',options,placeholder,span,rows}){
  return(
    <div style={{gridColumn:span?`span ${span}`:undefined}}>
      <label style={S.label}>{label}</label>
      {options?<select style={S.sel} name={name} value={value||''} onChange={onChange}>{options.map(o=><option key={o.v||o} value={o.v||o}>{o.l||o}</option>)}</select>
      :type==='textarea'?<textarea style={{...S.ta,minHeight:rows?rows*22:68}} name={name} value={value||''} onChange={onChange} placeholder={placeholder}/>
      :<input style={S.inp} type={type} name={name} value={value||''} onChange={onChange} placeholder={placeholder}/>}
    </div>
  );
}

function StatCard({label,value,sub,color=C.blue}){
  return(
    <div style={S.kpi(color)}>
      <div style={{position:'absolute',top:0,right:0,width:44,height:44,borderRadius:'0 11px 0 44px',background:`${color}15`}}/>
      <div style={{fontSize:10,color:C.muted,fontWeight:600,textTransform:'uppercase',letterSpacing:.8,marginBottom:5}}>{label}</div>
      <div style={{fontSize:22,fontWeight:800,color:C.strong,lineHeight:1}}>{value}</div>
      {sub&&<div style={{fontSize:11,color,fontWeight:600,marginTop:3}}>{sub}</div>}
    </div>
  );
}

function LineChartComp({data,color=C.blue}){
  const ref=useRef();const chartRef=useRef();
  useEffect(()=>{
    if(!ref.current||!data?.length)return;
    if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(ref.current,{type:'line',data:{labels:data.map(d=>d.x),datasets:[{data:data.map(d=>d.y),borderColor:color,backgroundColor:color+'20',fill:true,tension:.4,pointBackgroundColor:color,pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#1e293b'},ticks:{color:C.muted,font:{size:11}}},y:{grid:{color:'#1e293b'},ticks:{color:C.muted,font:{size:11}}}}}});
    return()=>{if(chartRef.current)chartRef.current.destroy()};
  },[data,color]);
  if(!data?.length)return<div style={{height:120,display:'flex',alignItems:'center',justifyContent:'center',color:C.muted,fontSize:13}}>Dati insufficienti</div>;
  return<canvas ref={ref} style={{height:130,maxHeight:130}}/>;
}

function BarChartComp({data,color=C.blue}){
  const ref=useRef();const chartRef=useRef();
  useEffect(()=>{
    if(!ref.current||!data?.length)return;
    if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(ref.current,{type:'bar',data:{labels:data.map(d=>d.x),datasets:[{data:data.map(d=>d.y),backgroundColor:color+'80',borderColor:color,borderWidth:1,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#1e293b'},ticks:{color:C.muted,font:{size:11}}},y:{grid:{color:'#1e293b'},ticks:{color:C.muted,font:{size:11}}}}}});
    return()=>{if(chartRef.current)chartRef.current.destroy()};
  },[data,color]);
  if(!data?.length)return<div style={{height:120,display:'flex',alignItems:'center',justifyContent:'center',color:C.muted,fontSize:13}}>Dati insufficienti</div>;
  return<canvas ref={ref} style={{height:130,maxHeight:130}}/>;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({patients,bookings}){
  const today=fmtDate();
  const todayBookings=bookings.filter(b=>new Date(b.data).toLocaleDateString('it-IT')===today);
  const totSedute=patients.reduce((a,p)=>a+(p.log?.length||0),0);
  return(
    <div>
      <div style={{marginBottom:18}}>
        <h1 style={{fontSize:20,fontWeight:800,color:C.strong}}>Dashboard</h1>
        <p style={{fontSize:13,color:C.muted,marginTop:3}}>{today}</p>
      </div>
      <div style={{...S.grid(3),marginBottom:18}}>
        <StatCard label="Pazienti totali" value={patients.length} color={C.blue}/>
        <StatCard label="Sedute registrate" value={totSedute} color={C.green}/>
        <StatCard label="Appuntamenti oggi" value={todayBookings.length} color={C.purple}/>
      </div>
      <div style={S.grid(2)}>
        <div style={S.card}>
          <div style={S.st}>Appuntamenti oggi</div>
          {todayBookings.length===0&&<div style={{color:C.muted,fontSize:13,padding:'12px 0'}}>Nessun appuntamento</div>}
          {todayBookings.map(b=>{
            const p=patients.find(x=>x.id===b.patientId);
            return(
              <div key={b.id} style={{...S.row,border:`1px solid ${C.border2}`,borderRadius:9,marginBottom:6}}>
                <div style={{width:6,height:36,borderRadius:3,background:C.blue,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,color:C.strong,fontWeight:600}}>{b.ora} · {p?.nome} {p?.cognome}</div>
                  <div style={{fontSize:11,color:C.muted}}>{b.durata} min · {b.tipo}</div>
                </div>
                <span style={S.tag(b.stato==='Confermato'?C.green:C.yellow)}>{b.stato}</span>
              </div>
            );
          })}
        </div>
        <div style={S.card}>
          <div style={S.st}>Progressi peso (tutti)</div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {patients.filter(p=>p.progressi?.length>1).map(p=>(
              <div key={p.id}>
                <div style={{fontSize:12,color:C.muted,marginBottom:4}}>{p.nome} {p.cognome}</div>
                <LineChartComp data={p.progressi.map(x=>({x:x.data.slice(0,5),y:x.peso}))} color={C.blue}/>
              </div>
            ))}
            {patients.filter(p=>p.progressi?.length>1).length===0&&<div style={{color:C.muted,fontSize:13}}>Aggiungi misurazioni nelle schede paziente</div>}
          </div>
        </div>
      </div>
    </div>
  );
}

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div><h1 style={{fontSize:20,fontWeight:800,color:C.strong}}>Pazienti</h1><p style={{fontSize:12,color:C.muted,marginTop:2}}>{filtered.length} pazienti</p></div>
        <button style={S.btn()} onClick={onAdd}>+ Nuovo paziente</button>
      </div>
      <div style={{...S.grid(4),marginBottom:16}}>
        {[{l:'Totali',v:filtered.length,c:C.blue},{l:'Profilo A',v:filtered.filter(p=>profilo(p.test?.mwtDist,p.test?.stsRip)?.code==='A').length,c:C.red},{l:'Profilo B',v:filtered.filter(p=>profilo(p.test?.mwtDist,p.test?.stsRip)?.code==='B').length,c:C.yellow},{l:'Profilo C',v:filtered.filter(p=>profilo(p.test?.mwtDist,p.test?.stsRip)?.code==='C').length,c:C.green}].map(x=>(
          <StatCard key={x.l} label={x.l} value={x.v} color={x.c}/>
        ))}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>

        {filtered.map(p=>{
          const b=bmi(p.peso,p.altezza);
          const {l:bl,c:bc}=bmiCat(b);
          const pr=profilo(p.test?.mwtDist,p.test?.stsRip);
          return(
            <div key={p.id} onClick={()=>onSelect(p.id)} style={{background:C.card,border:`1px solid ${C.border2}`,borderRadius:11,padding:'14px 18px',display:'flex',alignItems:'center',gap:14,cursor:'pointer',transition:'all .15s'}}

              onMouseLeave={e=>e.currentTarget.style.borderColor=C.border2}>
              <Avatar nome={p.nome} cognome={p.cognome} size={42}/>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700,color:C.strong}}>{p.nome} {p.cognome}</div>
                <div style={{fontSize:11,color:C.muted,marginTop:2}}>{p.id} · {p.dataValutazione}</div>
              </div>
              <div style={{display:'flex',gap:18,alignItems:'center'}}>
                <div style={{textAlign:'center'}}><div style={{fontSize:16,fontWeight:800,color:C.strong}}>{b}</div><div style={{fontSize:10,color:bc,fontWeight:600}}>{bl}</div></div>
                {pr&&<span style={S.tag(pr.c,pr.bg)}>{pr.code}</span>}
                <div style={{textAlign:'center'}}><div style={{fontSize:14,fontWeight:700,color:C.strong}}>{p.log?.length||0}</div><div style={{fontSize:10,color:C.muted}}>sedute</div></div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── PATIENT DETAIL ────────────────────────────────────────────────────────────

  const [showSchedaModal,setShowSchedaModal]=useState(false);
  const [newLog,setNewLog]=useState({data:fmtDate(),tipo:'',durata:'',rpe:'',note:''});
  const [newPeso,setNewPeso]=useState({data:fmtDate(),peso:'',nota:''});

  const p=patient;
  const b=bmi(p.peso,p.altezza);
  const {l:bl,c:bc}=bmiCat(b);
  const pr=profilo(p.test?.mwtDist,p.test?.stsRip);
  const fcMax=p.annoNascita?220-(new Date().getFullYear()-p.annoNascita):null;

  const upd=(fn)=>onUpdate({...p,...fn(p)});

  const addLog=()=>{
    const entry={...newLog,id:Date.now(),durata:+newLog.durata,rpe:+newLog.rpe};
    upd(x=>({log:[...(x.log||[]),entry]}));
    setShowLogModal(false);setNewLog({data:fmtDate(),tipo:'',durata:'',rpe:'',note:''});
  };
  const addPeso=()=>{
    const entry={...newPeso,peso:+newPeso.peso};
    upd(x=>({progressi:[...(x.progressi||[]),entry].sort((a,b2)=>a.data.localeCompare(b2.data))}));
    setShowPesoModal(false);setNewPeso({data:fmtDate(),peso:'',nota:''});
  };

  const tabs=[{id:'dash',l:'Dashboard'},{id:'ana',l:'Anagrafica'},{id:'test',l:'Test'},{id:'prog',l:'Programma'},{id:'schede',l:'Allenamento'},{id:'nutri',l:'Nutrizione'},{id:'log',l:`Log (${p.log?.length||0})`},{id:'stats',l:'Statistiche'}];

    const pesoTarget=p.altezza?(24.9*(p.altezza/100)**2).toFixed(1):null;

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .row{display:flex;justify-content:space-between;padding:6px 10px;background:#f8fafc;border-radius:6px}

  .kpi-val{font-size:22px;font-weight:900;color:#3b82f6}
  .kpi-lbl{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
  .badge-a{background:#fee2e2;color:#ef4444}
  .badge-b{background:#fef3c7;color:#f59e0b}
  .badge-c{background:#d1fae5;color:#10b981}
  .log-item{display:flex;gap:10px;padding:7px 10px;border-bottom:1px solid #f1f5f9;align-items:center}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

</div>

<div class="grid3" style="margin-bottom:28px">

</div>

<div class="grid">
<div>
<div class="section">
  <div class="section-title">Dati anagrafici</div>
  ${[['Data nascita',p.ddn],['Sesso',p.sesso],['Altezza',p.altezza?p.altezza+' cm':'—'],['Vita',p.vita?p.vita+' cm':'—'],['Fianchi',p.fianchi?p.fianchi+' cm':'—']].map(([k,v])=>`<div class="row"><span class="row-label">${k}</span><span class="row-value">${v||'—'}</span></div>`).join('')}
</div>

</div>
</div>
<div>
<div class="section">
  <div class="section-title">Test funzionali</div>

</div>
</div>

${p.programma?.cardio||p.programma?.forza?`

      ${p.programma.forza?`<div><div style="font-size:10px;color:#10b981;font-weight:700;text-transform:uppercase;margin-bottom:4px">Forza</div><div class="note-box" style="border-color:#10b981">${p.programma.forza}</div></div>`:''}
    </div>

</div>`:''}

${p.nutrizione?.kcal?`
<div class="section">

</div>`:''}

${(p.log||[]).length>0?`

              <div key={k} style={{display:'flex',gap:10,marginBottom:12}}>

                <div><div style={{...S.label,color:c}}>{k}</div><div style={{fontSize:13,color:C.text,lineHeight:1.6}}>{v||'—'}</div></div>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab==='schede'&&(
        <div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
            <div style={S.st}>Schede allenamento</div>
            <button style={S.btn('',true)} onClick={()=>setShowSchedaModal(true)}>+ Nuova scheda</button>
          </div>
          {(!p.schede||p.schede.length===0)&&<div style={{...S.card,textAlign:'center',padding:36,color:C.muted}}><div style={{fontSize:28,marginBottom:8}}>📋</div>Nessuna scheda. Clicca "+ Nuova scheda" per creare.</div>}
          {p.schede?.map((scheda,si)=>(
            <div key={si} style={{...S.card,marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <div>
                  <div style={{fontSize:14,fontWeight:700,color:C.strong}}>{scheda.nome}</div>
                  <div style={{fontSize:11,color:C.muted}}>{scheda.tipo} · {scheda.data} · {scheda.esercizi?.length||0} esercizi</div>
                </div>
                <button style={S.btn('danger',true)} onClick={()=>upd(x=>({schede:x.schede.filter((_,i)=>i!==si)}))}>✕ Elimina</button>
              </div>
              {scheda.esercizi?.map((ex,ei)=>{
                const eInfo=exercises.find(e=>e.id===ex.eId);
                return(
                  <div key={ei} style={{...S.row,border:`1px solid ${C.border2}`,borderRadius:8,marginBottom:6}}>
                    <div style={{width:26,height:26,borderRadius:6,background:C.blue+'20',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:C.blue}}>{ei+1}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,color:C.strong,fontWeight:600}}>{eInfo?.nome||ex.eId}</div>
                      <div style={{fontSize:11,color:C.muted}}>{eInfo?.muscoli}</div>
                    </div>
                    <div style={{display:'flex',gap:14,fontSize:12,color:C.muted}}>
                      <span><b style={{color:C.text}}>{ex.serie}</b> serie</span>
                      <span><b style={{color:C.text}}>{ex.reps}</b> rip</span>
                      {ex.peso&&<span><b style={{color:C.text}}>{ex.peso}</b> kg</span>}
                      <span>rec <b style={{color:C.text}}>{ex.rec}s</b></span>
                    </div>
                  </div>
                );
              })}
              {scheda.note&&<div style={{marginTop:8,fontSize:12,color:C.muted,fontStyle:'italic'}}>{scheda.note}</div>}
            </div>
          ))}
        </div>
      )}

      {tab==='nutri'&&(
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={S.grid(4)}>
            <StatCard label="Kcal/giorno" value={p.nutrizione?.kcal||'—'} color={C.orange}/>
            <StatCard label="Proteine (g)" value={p.nutrizione?.proteine||'—'} color={C.blue}/>
            <StatCard label="Carboidrati (g)" value={p.nutrizione?.carboidrati||'—'} color={C.yellow}/>
            <StatCard label="Grassi (g)" value={p.nutrizione?.grassi||'—'} color={C.green}/>
          </div>
          <div style={S.card}><div style={S.st}>Note nutrizionali</div><p style={{fontSize:13,color:C.text,lineHeight:1.7}}>{p.nutrizione?.note||'Nessuna nota'}</p></div>
          <div style={S.card}><div style={S.st}>Piano pasti</div><pre style={{fontSize:13,color:C.text,lineHeight:1.8,whiteSpace:'pre-wrap',fontFamily:'inherit'}}>{p.nutrizione?.pianoPasti||'Nessun piano pasti inserito'}</pre></div>
        </div>
      )}

      {tab==='log'&&(
        <div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
            <div style={S.st}>Storico sedute</div>
            <button style={S.btn('success',true)} onClick={()=>setShowLogModal(true)}>+ Seduta</button>
          </div>
          {(!p.log||p.log.length===0)&&<div style={{...S.card,textAlign:'center',padding:40,color:C.muted}}><div style={{fontSize:28,marginBottom:8}}>📋</div>Nessuna seduta registrata</div>}
          {[...(p.log||[])].reverse().map(s=>(
            <div key={s.id} style={{background:C.card,border:`1px solid ${C.border2}`,borderRadius:9,padding:'10px 14px',display:'flex',alignItems:'center',gap:12,marginBottom:6}}>
              <div style={{width:9,height:9,borderRadius:'50%',background:rpeC(s.rpe),flexShrink:0}}/>
              <span style={{fontSize:12,color:C.muted,minWidth:85}}>{s.data}</span>
              <span style={{fontSize:13,color:C.strong,flex:1,fontWeight:500}}>{s.tipo}</span>
              <span style={{fontSize:12,color:C.muted}}>{s.durata} min</span>
              <span style={S.tag(rpeC(s.rpe))}>{s.rpe} · {rpeL(s.rpe)}</span>
              <span style={{fontSize:11,color:C.muted,maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.note}</span>
              <button style={{...S.btn('danger',true),padding:'3px 8px'}} onClick={()=>upd(x=>({log:x.log.filter(l=>l.id!==s.id)}))}>✕</button>
            </div>
          ))}
        </div>
      )}

      {tab==='stats'&&(
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
            <div style={S.st}>Progressi peso</div>
            <button style={S.btn('',true)} onClick={()=>setShowPesoModal(true)}>+ Misurazione</button>
          </div>
          <div style={S.card}><LineChartComp data={(p.progressi||[]).map(x=>({x:x.data.slice(0,5),y:x.peso}))} color={C.blue}/></div>
          <div style={S.grid(2)}>
            <div style={S.card}><div style={S.st}>RPE sedute</div><BarChartComp data={(p.log||[]).slice(-10).map(s=>({x:s.data.slice(0,5),y:s.rpe}))} color={C.orange}/></div>
            <div style={S.card}><div style={S.st}>Durata sedute (min)</div><BarChartComp data={(p.log||[]).slice(-10).map(s=>({x:s.data.slice(0,5),y:s.durata}))} color={C.green}/></div>
          </div>
          <div style={S.card}>
            <div style={S.st}>Storico misurazioni</div>
            {(p.progressi||[]).map((x,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:13,padding:'6px 0',borderBottom:`1px solid ${C.border}`}}>
                <span style={{color:C.muted}}>{x.data}</span>
                <span style={{color:C.blue,fontWeight:700}}>{x.peso} kg</span>
                <span style={{color:C.muted}}>{x.nota}</span>
                <button style={{...S.btn('danger',true),padding:'2px 7px',fontSize:11}} onClick={()=>upd(x2=>({progressi:x2.progressi.filter((_,ii)=>ii!==i)}))}>✕</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {showLogModal&&<Modal title="Aggiungi seduta" onClose={()=>setShowLogModal(false)}>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <FF label="Data" name="data" value={newLog.data} onChange={e=>setNewLog(f=>({...f,data:e.target.value}))}/>
          <FF label="Tipo seduta" name="tipo" value={newLog.tipo} onChange={e=>setNewLog(f=>({...f,tipo:e.target.value}))} options={['Camminata lenta','Camminata svelto','Forza base','Forza intermedia','Forza avanzata','Cardio moderato','Cardio intenso','HIIT','Mobilità/stretching']}/>
          <FF label="Durata (min)" name="durata" type="number" value={newLog.durata} onChange={e=>setNewLog(f=>({...f,durata:e.target.value}))}/>
          <FF label="RPE (0-10)" name="rpe" type="number" value={newLog.rpe} onChange={e=>setNewLog(f=>({...f,rpe:e.target.value}))}/>
          <FF label="Note" name="note" type="textarea" value={newLog.note} onChange={e=>setNewLog(f=>({...f,note:e.target.value}))}/>
        </div>
        <div style={{display:'flex',gap:8,marginTop:16,justifyContent:'flex-end'}}>
          <button style={S.btn('ghost')} onClick={()=>setShowLogModal(false)}>Annulla</button>
          <button style={S.btn()} onClick={addLog}>Salva</button>
        </div>
      </Modal>}

      {showPesoModal&&<Modal title="Aggiungi misurazione peso" onClose={()=>setShowPesoModal(false)}>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <FF label="Data" name="data" value={newPeso.data} onChange={e=>setNewPeso(f=>({...f,data:e.target.value}))}/>
          <FF label="Peso (kg)" name="peso" type="number" value={newPeso.peso} onChange={e=>setNewPeso(f=>({...f,peso:e.target.value}))}/>
          <FF label="Nota" name="nota" value={newPeso.nota} onChange={e=>setNewPeso(f=>({...f,nota:e.target.value}))}/>
        </div>
        <div style={{display:'flex',gap:8,marginTop:16,justifyContent:'flex-end'}}>
          <button style={S.btn('ghost')} onClick={()=>setShowPesoModal(false)}>Annulla</button>
          <button style={S.btn()} onClick={addPeso}>Salva</button>
        </div>
      </Modal>}

      {showSchedaModal&&<SchedaModal exercises={exercises} onSave={(s)=>{upd(x=>({schede:[...(x.schede||[]),s]}));setShowSchedaModal(false)}} onClose={()=>setShowSchedaModal(false)}/>}
    </div>
  );
}

function SchedaModal({exercises,onSave,onClose}){
  const [form,setForm]=useState({nome:'',tipo:'Forza',data:fmtDate(),esercizi:[],note:''});
  const [addEx,setAddEx]=useState({eId:'',serie:3,reps:12,peso:'',rec:60});
  const upd=e=>setForm(f=>({...f,[e.target.name]:e.target.value}));
  return(
    <Modal title="Nuova scheda allenamento" onClose={onClose} width="660px">
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:16}}>
        <FF label="Nome scheda" name="nome" value={form.nome} onChange={upd}/>
        <FF label="Tipo" name="tipo" value={form.tipo} onChange={upd} options={['Forza','Cardio','Funzionale','Mobilità','Full Body','Upper','Lower','HIIT']}/>
        <FF label="Data" name="data" value={form.data} onChange={upd}/>
      </div>
      <div style={{...S.card,marginBottom:14}}>
        <div style={S.st}>Aggiungi esercizio</div>
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr',gap:8,alignItems:'end'}}>
          <FF label="Esercizio" name="eId" value={addEx.eId} onChange={e=>setAddEx(f=>({...f,eId:e.target.value}))} options={[{v:'',l:'-- Scegli --'},...exercises.map(e=>({v:e.id,l:`${e.nome} (${e.cat})`}))]}/>
          <FF label="Serie" name="serie" type="number" value={addEx.serie} onChange={e=>setAddEx(f=>({...f,serie:+e.target.value}))}/>
          <FF label="Rip." name="reps" type="number" value={addEx.reps} onChange={e=>setAddEx(f=>({...f,reps:+e.target.value}))}/>
          <FF label="Peso kg" name="peso" value={addEx.peso} onChange={e=>setAddEx(f=>({...f,peso:e.target.value}))}/>
          <FF label="Rec. (s)" name="rec" type="number" value={addEx.rec} onChange={e=>setAddEx(f=>({...f,rec:+e.target.value}))}/>
        </div>
        <button style={{...S.btn('success',true),marginTop:8}} onClick={()=>{if(addEx.eId){setForm(f=>({...f,esercizi:[...f.esercizi,{...addEx}]}));setAddEx({eId:'',serie:3,reps:12,peso:'',rec:60})}}}>+ Aggiungi</button>
      </div>
      {form.esercizi.length>0&&(
        <div style={{marginBottom:14}}>
          <div style={S.st}>Esercizi ({form.esercizi.length})</div>
          {form.esercizi.map((ex,i)=>{
            const info=exercises.find(e=>e.id===ex.eId);
            return(
              <div key={i} style={{...S.row,border:`1px solid ${C.border2}`,borderRadius:8,marginBottom:5}}>
                <span style={{fontSize:12,color:C.blue,fontWeight:700,minWidth:20}}>{i+1}</span>
                <span style={{flex:1,fontSize:13,color:C.strong}}>{info?.nome}</span>
                <span style={{fontSize:12,color:C.muted}}>{ex.serie}×{ex.reps}{ex.peso?` @ ${ex.peso}kg`:''} · rec {ex.rec}s</span>
                <button style={{...S.btn('danger',true),padding:'2px 7px'}} onClick={()=>setForm(f=>({...f,esercizi:f.esercizi.filter((_,ii)=>ii!==i)}))}>✕</button>
              </div>
            );
          })}
        </div>
      )}
      <FF label="Note scheda" name="note" type="textarea" value={form.note} onChange={upd}/>
      <div style={{display:'flex',gap:8,marginTop:16,justifyContent:'flex-end'}}>
        <button style={S.btn('ghost')} onClick={onClose}>Annulla</button>
        <button style={S.btn()} onClick={()=>form.nome&&onSave(form)}>Salva scheda</button>
      </div>
    </Modal>
  );
}

// ── CALENDARIO ────────────────────────────────────────────────────────────────
function CalendarView({patients,bookings,setBookings}){
  const [weekOffset,setWeekOffset]=useState(0);
  const [showModal,setShowModal]=useState(false);
  const [newB,setNewB]=useState({patientId:'',data:'',ora:'09:00',durata:60,tipo:'PT',note:'',stato:'Confermato'});

  const getWeekDays=()=>{
    const d=new Date();d.setDate(d.getDate()-d.getDay()+1+weekOffset*7);
    return Array.from({length:7},(_,i)=>{const x=new Date(d);x.setDate(d.getDate()+i);return x});
  };
  const days=getWeekDays();
  const hours=['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00'];

  const saveBooking=()=>{
    setBookings(prev=>[...prev,{...newB,id:'B'+Date.now()}]);
    setShowModal(false);
    setNewB({patientId:'',data:'',ora:'09:00',durata:60,tipo:'PT',note:'',stato:'Confermato'});
  };

  return(
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button style={S.btn('ghost',true)} onClick={()=>setWeekOffset(w=>w-1)}>‹</button>
          <span style={{fontSize:14,fontWeight:700,color:C.strong}}>
            {days[0].toLocaleDateString('it-IT',{day:'2-digit',month:'short'})} — {days[6].toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'})}
          </span>
          <button style={S.btn('ghost',true)} onClick={()=>setWeekOffset(w=>w+1)}>›</button>
          <button style={{...S.btn('ghost',true),fontSize:11}} onClick={()=>setWeekOffset(0)}>Oggi</button>
        </div>
        <button style={S.btn()} onClick={()=>setShowModal(true)}>+ Prenota</button>
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border2}`,borderRadius:12,overflow:'hidden'}}>
        <div style={{display:'grid',gridTemplateColumns:'60px repeat(7,1fr)',borderBottom:`1px solid ${C.border2}`}}>
          <div/>
          {days.map((d,i)=>{
            const isToday=d.toDateString()===new Date().toDateString();
            return(
              <div key={i} style={{padding:'10px 4px',textAlign:'center',borderLeft:`1px solid ${C.border}`}}>
                <div style={{fontSize:11,color:C.muted,fontWeight:600}}>{DAYS[i]}</div>
                <div style={{fontSize:16,fontWeight:800,color:isToday?C.blue:C.strong,marginTop:2}}>{d.getDate()}</div>
                <div style={{fontSize:10,color:C.muted}}>{MONTHS[d.getMonth()]}</div>
              </div>
            );
          })}
        </div>
        <div style={{overflowY:'auto',maxHeight:'calc(100vh - 260px)'}}>
          {hours.map(h=>(
            <div key={h} style={{display:'grid',gridTemplateColumns:'60px repeat(7,1fr)',borderBottom:`1px solid ${C.border}`,minHeight:50}}>
              <div style={{padding:'4px 8px',fontSize:11,color:C.muted,borderRight:`1px solid ${C.border2}`,display:'flex',alignItems:'center'}}>{h}</div>
              {days.map((d,di)=>{
                const dateStr=d.toISOString().slice(0,10);
                const slot=bookings.filter(b=>b.data===dateStr&&b.ora===h);
                return(
                  <div key={di} style={{borderLeft:`1px solid ${C.border}`,padding:3}}>
                    {slot.map(b=>{
                      const pat=patients.find(x=>x.id===b.patientId);
                      return(
                        <div key={b.id} style={{background:C.blue+'25',border:`1px solid ${C.blue}50`,borderRadius:5,padding:'3px 6px',cursor:'pointer'}}
                          onClick={()=>{if(window.confirm(`Eliminare prenotazione di ${pat?.nome}?`))setBookings(prev=>prev.filter(x=>x.id!==b.id))}}>
                          <div style={{fontSize:11,fontWeight:700,color:C.blue,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{pat?.nome} {pat?.cognome?.slice(0,1)}.</div>
                          <div style={{fontSize:10,color:C.muted}}>{b.durata}' · {b.tipo}</div>
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>
      {showModal&&(
        <Modal title="Nuova prenotazione" onClose={()=>setShowModal(false)}>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <FF label="Paziente" name="patientId" value={newB.patientId} onChange={e=>setNewB(f=>({...f,patientId:e.target.value}))} options={[{v:'',l:'-- Seleziona paziente --'},...patients.map(p=>({v:p.id,l:`${p.nome} ${p.cognome}`}))]}/>
            <div style={S.grid(2)}>
              <FF label="Data" name="data" type="date" value={newB.data} onChange={e=>setNewB(f=>({...f,data:e.target.value}))}/>
              <FF label="Ora" name="ora" value={newB.ora} onChange={e=>setNewB(f=>({...f,ora:e.target.value}))} options={['07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00']}/>
              <FF label="Durata (min)" name="durata" type="number" value={newB.durata} onChange={e=>setNewB(f=>({...f,durata:+e.target.value}))}/>
              <FF label="Tipo" name="tipo" value={newB.tipo} onChange={e=>setNewB(f=>({...f,tipo:e.target.value}))} options={['PT','Valutazione','Follow-up','Corpo libero','Pesi']}/>
            </div>
            <FF label="Note" name="note" type="textarea" value={newB.note} onChange={e=>setNewB(f=>({...f,note:e.target.value}))}/>
          </div>
          <div style={{display:'flex',gap:8,marginTop:16,justifyContent:'flex-end'}}>
            <button style={S.btn('ghost')} onClick={()=>setShowModal(false)}>Annulla</button>
            <button style={S.btn()} onClick={saveBooking}>Prenota</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── ESERCIZI ──────────────────────────────────────────────────────────────────
function ExercisesPage({exercises,setExercises}){
  const [showModal,setShowModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({nome:'',cat:'Forza',muscoli:'',desc:''});
  const [filter,setFilter]=useState('Tutti');
  const upd=e=>setForm(f=>({...f,[e.target.name]:e.target.value}));
  const cats=['Tutti',...new Set(exercises.map(e=>e.cat))];
  const filtered=filter==='Tutti'?exercises:exercises.filter(e=>e.cat===filter);
  const openAdd=()=>{setForm({nome:'',cat:'Forza',muscoli:'',desc:''});setEditing(null);setShowModal(true)};
  const openEdit=(ex)=>{setForm({...ex});setEditing(ex.id);setShowModal(true)};
  const save=()=>{
    if(editing)setExercises(es=>es.map(e=>e.id===editing?{...form,id:editing}:e));
    else setExercises(es=>[...es,{...form,id:'E'+Date.now()}]);
    setShowModal(false);
  };
  const catColors={Forza:C.blue,Cardio:C.green,Core:C.orange,Mobilità:C.teal,Funzionale:C.purple};
  return(
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <h1 style={{fontSize:20,fontWeight:800,color:C.strong}}>Libreria Esercizi</h1>
        <button style={S.btn()} onClick={openAdd}>+ Nuovo esercizio</button>
      </div>
      <div style={{display:'flex',gap:6,marginBottom:14}}>
        {cats.map(c=><button key={c} style={S.btn(filter===c?'primary':'ghost',true)} onClick={()=>setFilter(c)}>{c}</button>)}
      </div>
      <div style={S.grid(3)}>
        {filtered.map(ex=>(
          <div key={ex.id} style={{...S.card,border:`1px solid ${catColors[ex.cat]||C.border2}30`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
              <div><div style={{fontSize:13,fontWeight:700,color:C.strong,marginBottom:4}}>{ex.nome}</div><span style={S.tag(catColors[ex.cat]||C.muted)}>{ex.cat}</span></div>
              <div style={{display:'flex',gap:4}}>
                <button style={{...S.btn('ghost',true),padding:'3px 7px'}} onClick={()=>openEdit(ex)}>✏</button>
                <button style={{...S.btn('danger',true),padding:'3px 7px'}} onClick={()=>setExercises(es=>es.filter(e=>e.id!==ex.id))}>✕</button>
              </div>
            </div>
            <div style={{fontSize:11,color:C.muted,marginBottom:4}}><b style={{color:C.cyan}}>Muscoli:</b> {ex.muscoli}</div>
            <div style={{fontSize:12,color:C.dim,lineHeight:1.5}}>{ex.desc}</div>
          </div>
        ))}
      </div>
      {showModal&&(
        <Modal title={editing?'Modifica esercizio':'Nuovo esercizio'} onClose={()=>setShowModal(false)}>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <FF label="Nome" name="nome" value={form.nome} onChange={upd}/>
            <div style={S.grid(2)}>
              <FF label="Categoria" name="cat" value={form.cat} onChange={upd} options={['Forza','Cardio','Core','Mobilità','Funzionale']}/>
              <FF label="Muscoli" name="muscoli" value={form.muscoli} onChange={upd}/>
            </div>
            <FF label="Descrizione / note tecniche" name="desc" type="textarea" value={form.desc} onChange={upd}/>

          <div style={{display:'flex',gap:8,marginTop:16,justifyContent:'flex-end'}}>

            <button style={S.btn()} onClick={save}>Salva</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(undefined);

  useEffect(()=>{
    // Timeout: se Firebase non risponde in 4s, mostra login
    const timeout=setTimeout(()=>{
      setUser(prev=>prev===undefined?null:prev);
    },4000);
    const unsub=fbAuth.onAuthStateChanged(u=>{
      clearTimeout(timeout);
      setUser(u);
    });
    return()=>{clearTimeout(timeout);unsub();};
  },[]);

  if(user===undefined) return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',background:'#07090f',gap:16}}>
      <div style={{fontSize:32,fontWeight:900,color:'#3b82f6'}}>PT Board</div>
      <div style={{width:36,height:36,border:'3px solid #334155',borderTop:'3px solid #3b82f6',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  if(!user) return <AuthScreen/>;
  return <AppInner user={user}/>;
}

function AppInner({user}){
  const stored=load();
  const [patients,setPatients]=useState(stored?.patients||INIT_PATIENTS);
  const [bookings,setBookings]=useState(stored?.bookings||INIT_BOOKINGS);
  const [exercises,setExercises]=useState(stored?.exercises||INIT_EXERCISES);
  const [page,setPage]=useState('dash');
  const [selectedId,setSelectedId]=useState(null);
  const [editingPatient,setEditingPatient]=useState(null);
  const [isNew,setIsNew]=useState(false);
  const [search,setSearch]=useState('');
  const [saveMsg,setSaveMsg]=useState('');
  const [showParametri,setShowParametri]=useState(false);
  const [sidebarOpen,setSidebarOpen]=useState(true);
  const [isLight,setIsLight]=useState(stored?.isLight||false);
  const [dataReady,setDataReady]=useState(true);
  const [showValutazione,setShowValutazione]=useState(false);
  const [showTutorial,setShowTutorial]=useState(false);
  const firstLoad=useRef(true);

  // Carica dati da Firebase in background (non blocca l'app)
  useEffect(()=>{
    fbLoad(user.uid).then(remote=>{
      if(remote){
        if(remote.patients) setPatients(remote.patients);
        if(remote.bookings) setBookings(remote.bookings);
        if(remote.exercises) setExercises(remote.exercises);
        if(remote.isLight!==undefined) setIsLight(remote.isLight);
      }
    }).catch(()=>{});
    if(typeof Notification!=='undefined'&&Notification.permission==='default') Notification.requestPermission();
  },[]);

  // Applica tema
  useEffect(()=>{
    if(isLight) document.documentElement.classList.add('light');
    else document.documentElement.classList.remove('light');
  },[isLight]);

  // Salva su localStorage + Firebase
  useEffect(()=>{
    if(firstLoad.current){firstLoad.current=false;return;}
    const data={patients,bookings,exercises,isLight};
    save(data);
    fbSave(user.uid,data);
    setSaveMsg('✓ Salvato');
    const t=setTimeout(()=>setSaveMsg(''),1500);
    return()=>clearTimeout(t);
  },[patients,bookings,exercises,isLight]);

  const selected=patients.find(p=>p.id===selectedId);

  const emptyP=()=>({id:'',cognome:'',nome:'',ddn:'',altezza:'',peso:'',vita:'',fianchi:'',pa:'',fc:'',sesso:'F',annoNascita:'',patologie:'',farmaci:'',sintomiSforzo:'NO',allergie:'',attivita:'Sedentaria',obiettivo:'',preferenze:'',stressPercepito:'Medio',sonno:'',dataValutazione:fmtDate(),test:{mwtDist:'',mwtRpe:'',mwtSintomi:'',stsRip:'',stsNote:'',noteVal:''},programma:{dataInizio:'',sedute:'',minCardio:'',minForza:'',cardio:'',forza:'',note:''},nutrizione:{kcal:'',proteine:'',carboidrati:'',grassi:'',note:'',pianoPasti:''},progressi:[],schede:[],log:[],createdAt:fmtDate()});

  const handleSave=(form)=>{
    if(!form.cognome||!form.nome)return alert('Cognome e nome obbligatori');
    if(isNew){
      const id=nextPid(patients);
      const p={...form,id,progressi:form.progressi||[],schede:form.schede||[],log:form.log||[]};
      if(p.peso)p.progressi=[{data:p.dataValutazione||fmtDate(),peso:+p.peso,nota:'Primo accesso'}];
      setPatients(ps=>[...ps,p]);setPage('patients');
    }else{
      setPatients(ps=>ps.map(p=>p.id===form.id?form:p));setSelectedId(form.id);setPage('detail');
    }
  };

  const navItems=[
    {id:'dash',icon:'⊞',l:'Dashboard'},
    {id:'patients',icon:'👥',l:'Pazienti'},
    {id:'calendar',icon:'📅',l:'Calendario'},
    {id:'exercises',icon:'🏋',l:'Esercizi'},
  ];

  return(
    <div style={S.app}>
      {/* Overlay per chiudere sidebar su mobile */}
      {sidebarOpen&&<div onClick={()=>setSidebarOpen(false)} style={{position:'fixed',inset:0,background:'#00000050',zIndex:50,display:'none'}} id="sb-overlay"/>}

      {/* Sidebar */}
      <div style={{...S.sb,position:'fixed',top:0,left:0,height:'100%',zIndex:100,
        transform:sidebarOpen?'translateX(0)':'translateX(-100%)',
        transition:'transform .25s ease',boxShadow:sidebarOpen?'4px 0 20px #0008':'none'}}>
        <div style={S.sbh}>
          {/* Pulsante chiudi (X) */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              
              <div>
                <div style={{textAlign:'center',padding:'8px 0'}}>
              <div style={{fontSize:16,fontWeight:900,color:'#3b82f6',letterSpacing:0.5}}>PT Board</div>
              <div style={{fontSize:10,fontWeight:700,color:'#e8c84a',letterSpacing:2,textTransform:'uppercase',marginTop:2}}></div>
            </div>
              </div>
            </div>
            <button onClick={()=>setSidebarOpen(false)} style={{background:'transparent',border:'none',cursor:'pointer',color:C.dim,fontSize:20,padding:'4px 6px',borderRadius:6,lineHeight:1}}>✕</button>
          </div>
        </div>
        <div style={S.nav}>
          <div style={S.navlbl}>Menu</div>
          {navItems.map(n=>(
            <button key={n.id} style={S.navi(page===n.id||((page==='detail'||page==='form')&&n.id==='patients'))} onClick={()=>{setPage(n.id);setSelectedId(null);setSidebarOpen(false);}}>
              <span style={{fontSize:14}}>{n.icon}</span><span>{n.l}</span>
            </button>
          ))}
          <button style={{...S.navi(false),background:'linear-gradient(135deg,#3b82f620,#10b98115)',border:'1px solid #3b82f640',marginTop:8}} onClick={()=>{setShowValutazione(true);setSidebarOpen(false);}}>
            <span style={{fontSize:14}}>🎯</span><span style={{color:C.blue,fontWeight:700}}>Valutazione 20 min</span>
          </button>
          <button style={{...S.navi(false),background:'#a78bfa10',border:'1px solid #a78bfa30',marginTop:4}} onClick={()=>{setShowTutorial(true);setSidebarOpen(false);}}>
            <span style={{fontSize:14}}>📖</span><span style={{color:'#a78bfa',fontWeight:700}}>Tutorial</span>
          </button>
          <div style={S.navlbl}>Recenti</div>
          {patients.slice(-5).reverse().map(p=>(
            <button key={p.id} style={{...S.navi(selectedId===p.id&&page==='detail'),gap:7}} onClick={()=>{setSelectedId(p.id);setPage('detail');setSidebarOpen(false);}}>
              <Avatar nome={p.nome} cognome={p.cognome} size={22}/>
              <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12}}>{p.nome} {p.cognome}</span>
            </button>
          ))}
        </div>
        <div style={{borderTop:`1px solid ${C.border2}`,flexShrink:0}}>
          <button onClick={()=>setShowParametri(p=>!p)} style={{display:'flex',alignItems:'center',gap:9,width:'100%',padding:'12px 16px',background:'transparent',border:'none',cursor:'pointer',color:showParametri?C.blue:C.dim,fontSize:13,fontWeight:600,transition:'all .15s'}}>
            <span style={{fontSize:14}}>⚙</span><span>Parametri</span>
            <span style={{marginLeft:'auto',fontSize:10,color:C.muted}}>{showParametri?'▲':'▼'}</span>
          </button>
          {showParametri&&(
            <div style={{padding:'12px 16px 16px',background:C.sidebar,borderTop:`1px solid ${C.border}`}}>
              <div style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:10}}>Tema</div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,marginBottom:12}}>
                <span style={{fontSize:12,color:C.dim}}>🌙 Scuro</span>
                <div onClick={()=>setIsLight(v=>!v)} style={{width:44,height:24,borderRadius:12,background:isLight?C.blue:'#334155',cursor:'pointer',position:'relative',transition:'background .25s',flexShrink:0}}>
                  <div style={{position:'absolute',top:3,left:isLight?22:3,width:18,height:18,borderRadius:'50%',background:'#fff',transition:'left .25s',boxShadow:'0 1px 4px #0004'}}/>
                </div>
                <span style={{fontSize:12,color:C.dim}}>☀️ Chiaro</span>
              </div>
              <div style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Account</div>
              <div style={{fontSize:11,color:C.text,marginBottom:8,wordBreak:'break-all'}}>{user?.email}</div>
              <button onClick={()=>fbAuth.signOut()} style={{width:'100%',padding:'7px',borderRadius:7,border:`1px solid ${C.red}40`,background:C.red+'15',color:C.red,fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>
                Esci dall'account
              </button>
            </div>
          )}
          <div style={{padding:'6px 16px 10px',fontSize:10,color:C.muted}}>PT Board · {fmtDate()}</div>
        </div>
      </div>

      {/* Main content — occupa tutto lo schermo */}
      <div style={{...S.main,width:'100%'}}>
        <div style={{...S.topbar,position:'relative'}}>
          <button onClick={()=>setSidebarOpen(v=>!v)} style={{background:'transparent',border:'none',cursor:'pointer',color:C.dim,fontSize:22,padding:'4px 8px',borderRadius:6,flexShrink:0,lineHeight:1}}>☰</button>
          <div style={{position:'relative',flex:1,maxWidth:300}}>
            <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:C.dim,fontSize:13}}>🔍</span>
            <input style={{...S.inp,paddingLeft:32}} placeholder="Cerca paziente..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <div style={{position:'absolute',left:'50%',transform:'translateX(-50%)',pointerEvents:'none',textAlign:'center',lineHeight:1.2}}>
            <div style={{fontSize:14,fontWeight:900,color:'#3b82f6',letterSpacing:0.5}}>PT Board</div>
            <div style={{fontSize:9,fontWeight:700,color:'#64748b',letterSpacing:1.5,textTransform:'uppercase'}}></div>
          </div>
          {saveMsg&&<span style={{fontSize:12,color:C.green,fontWeight:600,marginLeft:'auto'}}>{saveMsg}</span>}
          <div style={{fontSize:12,color:C.muted,marginLeft:'auto',flexShrink:0}}>{patients.length} pazienti</div>
        </div>
        <div style={S.content}>
          {page==='dash'&&<Dashboard patients={patients} bookings={bookings}/>}

          {page==='detail'&&selected&&<PatientDetail patient={selected} exercises={exercises} onBack={()=>{setPage('patients');setSelectedId(null)}} onEdit={()=>{setEditingPatient({...selected});setIsNew(false);setPage('form')}} onDelete={()=>{if(window.confirm(`Eliminare ${selected.nome}?`)){setPatients(ps=>ps.filter(p=>p.id!==selectedId));setPage('patients')}}} onUpdate={p=>setPatients(ps=>ps.map(x=>x.id===p.id?p:x))}/>}
          {page==='form'&&editingPatient&&<PatientForm initial={editingPatient} onSave={handleSave} onCancel={()=>setPage(isNew?'patients':'detail')} isNew={isNew}/>}
          {page==='calendar'&&<CalendarView patients={patients} bookings={bookings} setBookings={setBookings}/>}
          {page==='exercises'&&<ExercisesPage exercises={exercises} setExercises={setExercises}/>}
        </div>
      </div>
      {showValutazione&&<WizardValutazione
        onSave={p=>{
          const id=nextPid(patients);
          const np={...p,id,progressi:p.peso?[{data:fmtDate(),peso:+p.peso,nota:'Primo accesso — Valutazione 20 min'}]:[],log:[],schede:[]};
          setPatients(ps=>[...ps,np]);
          setShowValutazione(false);
          setSelectedId(id);setPage('detail');
        }}
        onClose={()=>setShowValutazione(false)}
      />}
      {showTutorial&&<TutorialModal onClose={()=>setShowTutorial(false)} isLight={isLight}/>}
    </div>
  );
}

      {num:2,cardio:'Camminata/corsa blanda 25 min, RPE 4-5. Intervalli 3 min corsa / 2 min cammino.',forza:'Aggiunta peso leggero (2-4 kg). Circuit training 3 giri.',note:'Aumentare intensità cardio del 10%.'},
      {num:3,cardio:'30 min cardio (bike o camminata veloce), RPE 5-6.',forza:'Supersets: squat+curl, affondi+press (3×12). Recupero 45s.',note:'Introdurre attrezzatura minima.'},
      {num:4,cardio:'35 min cardio variato (LISS + 2×5 min HIIT leggero), RPE 5-7.',forza:'Full body con sovraccarichi: 4 esercizi × 3 giri × 12 rip.',note:'Rivalutare test funzionali. Obiettivo: profilo C.'},
