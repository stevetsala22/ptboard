const aiCoach=async(paziente)=>{
  const prompt=`Sei un esperto personal trainer. Analizza questo profilo cliente e suggerisci un programma di allenamento personalizzato in italiano. Sii specifico, pratico e motivante.
PROFILO:
- Nome: Paziente (dati anonimizzati)
- Età: ${paziente.annoNascita?new Date().getFullYear()-paziente.annoNascita:'-'} anni
- Sesso: ${paziente.sesso}
- Peso: ${paziente.peso} kg | Altezza: ${paziente.altezza} cm
- BMI: ${paziente.altezza&&paziente.peso?(paziente.peso/(paziente.altezza/100)**2).toFixed(1):'-'}
- Attività attuale: ${paziente.attivita}
- Obiettivo: ${paziente.obiettivo||'non specificato'}
- Patologie: ${paziente.patologie||'nessuna'}
- Test MWT: ${paziente.test?.mwtDist||'-'} m | STS: ${paziente.test?.stsRip||'-'} ripetizioni
- Stress percepito: ${paziente.stressPercepito} | Sonno: ${paziente.sonno||'-'} ore
Fornisci:
1. 🎯 Obiettivo prioritario (2 righe)
2. 📅 Schema settimanale (giorni e tipo di allenamento)
3. 💪 3 esercizi chiave con serie/reps
4. 🥗 Consiglio nutrizionale rapido
5. ⚠️ Precauzioni specifiche per questo cliente`;
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      messages:[{role:'user',content:prompt}]
    })
  });
  const data=await res.json();
  return data.content?.[0]?.text||'Errore nel generare il programma.';
};

<script>
var ttTimer=null;
document.addEventListener('mouseover',function(e){
  var wrap=e.target.closest('.tt');
  if(!wrap)return;
  var tp=wrap.querySelector('.tp');
  if(!tp)return;
  if(ttTimer)clearTimeout(ttTimer);
  ttTimer=setTimeout(function(){
    var rect=wrap.getBoundingClientRect();
    var tw=tp.offsetWidth||150;
    var th=tp.offsetHeight||28;
    var mg=8;
    var vw=window.innerWidth;
    var vh=window.innerHeight;
    var top=rect.bottom+mg;
    var left=rect.left+rect.width/2-tw/2;
    if(left+tw>vw-mg)left=vw-tw-mg;
    if(left<mg)left=mg;
    if(top+th>vh-mg)top=rect.top-th-mg;
    tp.style.top=top+'px';
    tp.style.left=left+'px';
    tp.style.opacity='1';
  },800);
});
document.addEventListener('mouseout',function(e){
  var wrap=e.target.closest('.tt');
  if(!wrap)return;
  if(ttTimer){clearTimeout(ttTimer);ttTimer=null;}
  var tp=wrap.querySelector('.tp');
  if(tp)tp.style.opacity='0';
});
</script>

  if(!profile) return false;

// ── CLASSIFICAZIONE PESATA SCIENTIFICA ────────────────────────────────────────
const calcScore=(test,sesso,extra)=>{
  // test = {mwtDist, stsRip, handgrip, tugSec, biaFM/massaGrassa, ...}
  // extra = {biaFM} from bia object or massaGrassa from test
  const m=sesso==='M';
  const components=[];
  // 1. CAPACITÀ AEROBICA (peso 40%) — 6MWT
  if(test?.mwtDist&&+test.mwtDist>0){
    const d=+test.mwtDist;
    const s=d>550?100:d>=451?75:d>=300?50:25;
    components.push({id:'aerobica',label:'Capacita aerobica (6MWT)',w:40,score:s,val:d+'m',icon:'🚶'});
  }
  // 2. FORZA (peso 30%) — media STS + Handgrip
  const stsS=test?.stsRip&&+test.stsRip>0?(+test.stsRip>15?100:+test.stsRip>=10?67:33):null;
  const hg=test?.handgrip&&+test.handgrip>0?+test.handgrip:null;
  let hgS=null;
  if(hg!==null){
    if(m){hgS=hg>=44?100:hg>=35?75:hg>=25?50:25;}
    else{hgS=hg>=28?100:hg>=20?75:hg>=14?50:25;}
  }
  let forzaScore=null,forzaVal='';
  if(stsS!==null&&hgS!==null){forzaScore=Math.round((stsS+hgS)/2);forzaVal='STS '+test.stsRip+' rip + HG '+hg+'kg';}
  else if(stsS!==null){forzaScore=stsS;forzaVal='STS '+test.stsRip+' rip';}
  else if(hgS!==null){forzaScore=hgS;forzaVal='HG '+hg+'kg';}
  if(forzaScore!==null) components.push({id:'forza',label:'Forza (STS + Handgrip)',w:30,score:forzaScore,val:forzaVal,icon:'💪'});
  // 3. COMPOSIZIONE CORPOREA (peso 20%) — FM%
  const fm=extra?.biaFM?+extra.biaFM:(test?.massaGrassa?+test.massaGrassa:(test?.biaFM?+test.biaFM:null));
  if(fm!==null&&fm>0){
    let cs;
    if(m){cs=fm<14?100:fm<=17?75:fm<=24?50:25;}
    else{cs=fm<21?100:fm<=24?75:fm<=31?50:25;}
    components.push({id:'corpo',label:'Composizione corporea (FM%)',w:20,score:cs,val:fm+'%',icon:'📏'});
  }
  // 4. EQUILIBRIO (peso 10%) — TUG
  if(test?.tugSec&&+test.tugSec>0){
    const t=+test.tugSec;
    const ts=t<10?100:t<=12?67:t<=20?33:0;
    components.push({id:'equilibrio',label:'Equilibrio (TUG)',w:10,score:ts,val:t+'s',icon:'⏱'});
  }
  // Minimo: almeno 6MWT o STS
  if(components.length===0)return null;
  if(!components.find(c=>c.id==='aerobica')&&!components.find(c=>c.id==='forza'))return null;
  // Calcolo media pesata normalizzata
  const totalW=components.reduce((a,c)=>a+c.w,0);
  const score=Math.round(components.reduce((a,c)=>a+c.score*(c.w/totalW),0));
  // Componenti mancanti
  const allIds=['aerobica','forza','corpo','equilibrio'];
  const missing=allIds.filter(id=>!components.find(c=>c.id===id));
  const missingLabels={aerobica:'6MWT',forza:'STS o Handgrip',corpo:'FM% (BIA o plicometria)',equilibrio:'TUG'};
  // Risultato
  let code,l,c,bg;
  if(score>=70){code='C';l=gT().profileGood;c=C.green;bg='#d1fae5';}
  else if(score>=40){code='B';l=gT().profileMed;c=C.yellow;bg='#fef3c7';}
  else{code='A';l=gT().profileLow;c=C.red;bg='#fee2e2';}
  return{code,l,c,bg,score,components,missing:missing.map(id=>missingLabels[id])};
};

// Wrapper retrocompatibile — stessa interfaccia {code,l,c,bg}
const profilo=(mwt,sts,sesso,test,extra)=>{
  // Chiamata legacy con solo mwt,sts → costruisci test minimale
  const t=test||{mwtDist:mwt,stsRip:sts};
  const r=calcScore(t,sesso||'M',extra);
  return r;
};
const calcNutrizione=(p)=>{
  if(!p)return null;
  // STEP 1 — BMR
  var bmr;
  if(p.bia?.FM&&p.peso){
    var ffm=(+p.peso)*(1-(+p.bia.FM)/100);
    bmr=370+(21.6*ffm);
  }else{
    var eta=p.annoNascita?(new Date().getFullYear()-p.annoNascita):null;
    if(!eta||!p.peso||!p.altezza)return null;
    if(p.sesso==='M')bmr=(10*(+p.peso))+(6.25*(+p.altezza))-(5*eta)+5;
    else bmr=(10*(+p.peso))+(6.25*(+p.altezza))-(5*eta)-161;
  }
  if(p.patologie){var pat0=p.patologie.toLowerCase();if(pat0.includes('tiroidea')||pat0.includes('ipotiroidismo'))bmr*=0.90;}
  if(p.fumo==='Fumatore regolare')bmr+=200;else if(p.fumo==='Fumatore occasionale')bmr+=100;
  // STEP 2 — TDEE
  var fattori={'Sedentaria':1.2,'Poco attiva':1.375,'Moderata':1.55,'Attiva':1.725,'Molto attiva':1.9};
  var fattore=fattori[p.attivita]||1.4;
  var tdee=bmr*fattore;
  // STEP 3 — Calorie target
  var obiettivoMap={'Perdere peso':0.80,'Aumentare massa':1.15,'Resistenza':1.05,'Forza':1.10,'Salute':1.0,'Riabilitazione':1.0,'Performance':1.10,'Benessere':1.0};
  var molt=obiettivoMap[p.obiettivo]||1.0;
  var kcal=Math.round(tdee*molt);
  if(p.stressPercepito==='Alto'||p.stressPercepito==='Molto alto')kcal=Math.round(kcal*1.05);
  // STEP 4 — Macros
  var protMap={'Perdere peso':2.0,'Aumentare massa':2.0,'Resistenza':1.6,'Forza':2.0,'Salute':1.4,'Riabilitazione':1.6,'Performance':1.8,'Benessere':1.4};
  var protPerKg=protMap[p.obiettivo]||1.6;
  var pesoCalcolo=+p.peso;
  var bmiVal=p.altezza&&p.peso?(+p.peso)/((+p.altezza/100)**2):null;
  if(bmiVal&&bmiVal>30)pesoCalcolo=24.9*((+p.altezza/100)**2);
  var proteine=Math.round(protPerKg*pesoCalcolo);
  var kcalProt=proteine*4;
  var grassiPct={'Perdere peso':0.25,'Aumentare massa':0.25,'Resistenza':0.25,'Forza':0.30,'Salute':0.30,'Riabilitazione':0.30,'Performance':0.25,'Benessere':0.30};
  var pctG=grassiPct[p.obiettivo]||0.28;
  if(p.patologie){var pat1=p.patologie.toLowerCase();if(pat1.includes('dislipidemia')||pat1.includes('cardiopatia'))pctG=0.20;}
  var grassi=Math.round((kcal*pctG)/9);
  var kcalGrassi=grassi*9;
  var carboidrati=Math.round((kcal-kcalProt-kcalGrassi)/4);
  if(carboidrati<0)carboidrati=0;
  if(p.patologie){
    var pat2=p.patologie.toLowerCase();
    if(pat2.includes('diabete tipo 2')){var maxCarbo=Math.round((kcal*0.40)/4);if(carboidrati>maxCarbo){var diff=carboidrati-maxCarbo;carboidrati=maxCarbo;grassi+=Math.round((diff*4)/9);}}
    if(pat2.includes('diabete tipo 1')){if(carboidrati<130)carboidrati=130;}
  }
  // STEP 5 — Note
  var note=[];
  if(+p.sonno<6)note.push('Sonno ridotto (<6h): aumentare proteine e attenzione al recupero');
  if(p.patologie){
    var pat3=p.patologie.toLowerCase();
    if(pat3.includes('ipertensione'))note.push('Ipertensione: sodio < 2g/giorno, aumentare potassio (frutta, verdura)');
    if(pat3.includes('diabete tipo 2'))note.push('Diabete T2: carboidrati a basso indice glicemico, evitare zuccheri semplici');
    if(pat3.includes('diabete tipo 1'))note.push('Diabete T1: carboidrati stabili e prevedibili, minimo 130g/giorno');
    if(pat3.includes('dislipidemia'))note.push('Dislipidemia: grassi saturi < 7%, preferire omega-3, aumentare fibre');
    if(pat3.includes('cardiopatia'))note.push('Cardiopatia: grassi saturi < 7%, sodio < 1.5g, dieta mediterranea');
    if(pat3.includes('osteoporosi'))note.push('Osteoporosi: calcio 1200mg/giorno, vitamina D, proteine adeguate');
    if(pat3.includes('artrosi')||pat3.includes('artrite'))note.push('Artrosi/artrite: alimenti anti-infiammatori (omega-3, curcuma, verdure)');
    if(pat3.includes('depressione')||pat3.includes('ansia'))note.push('Benessere mentale: omega-3, triptofano (tacchino, semi), limitare caffeina');
    if(pat3.includes('obesita'))note.push('Obesità: deficit calorico moderato, proteine calcolate su peso ideale');
    if(pat3.includes('tiroidea'))note.push('Patologia tiroidea: monitorare metabolismo, aggiustare kcal con il medico');
  }
  if(p.allergie){
    var all=p.allergie.toLowerCase();
    if(all.includes('lattosio'))note.push('Intolleranza lattosio: sostituire con alternative vegetali o lactose-free');
    if(all.includes('glutine')||all.includes('celiachia'))note.push('Celiachia: evitare frumento/orzo/segale, usare riso, mais, quinoa, patate');
    if(all.includes('nichel'))note.push('Allergia nichel: limitare pomodoro, cacao, legumi secchi, frutta secca');
  }
  if(p.alcol&&(p.alcol.includes('8-14')||p.alcol.includes('>14')))note.push('Consumo alcol elevato: attenzione alle calorie vuote (~7 kcal/g)');
  if(p.stressPercepito==='Alto'||p.stressPercepito==='Molto alto')note.push('Stress elevato: kcal leggermente aumentate per compensare il cortisolo');
  note.push('⚠️ Suggerimenti nutrizionali generici — per un piano personalizzato rivolgersi a un nutrizionista');
  return{kcal,proteine,carboidrati,grassi,note:note.join('\n')};
};

// ── 1. SpO2 — soglie WHO/AHA ────────────────────────────────────────────────
const interpSpO2=(val)=>{
  if(!val)return null;const v=+val;
  if(v>=96)return{l:'Normale',c:'#10b981',cons:'Saturazione ottimale — nessuna limitazione all\'esercizio.'};
  if(v>=94)return{l:'Lieve riduzione',c:'#f59e0b',cons:'Monitorare durante esercizio aerobico. Evitare alta quota non acclimatata. Se persistente, consultare medico.'};
  if(v>=90)return{l:'Ipossiemia moderata',c:'#fb923c',cons:'⚠️ Limitare intensità a RPE ≤4. Evitare esercizio anaerobico. Consultare medico prima di proseguire attività fisica.'};
  return{l:'Ipossiemia severa',c:'#ef4444',cons:'🚨 STOP esercizio — invio immediato a valutazione medica. SpO2 <90% richiede ossigenoterapia (WHO).'};
};

// ── 2. Handgrip — normativi Dodds 2014 (kg) ─────────────────────────────────
const interpHandgrip=(kg,sesso,eta)=>{
  if(!kg)return null;const v=+kg,m=sesso==='M',a=+eta||50;
  // Soglie basate su Dodds RM et al. (2014) "Grip strength across the life course" + cut-off sarcopenia EWGSOP2 2019
  if(m){
    const sarco=a<65?30:27; // EWGSOP2: <27 kg uomini anziani, <30 giovani adulti
    const ref=a<30?50:a<40?51:a<50?50:a<60?46:a<70?42:a<80?36:30; // mediane Dodds
    if(v<sarco)return{l:'Sotto soglia sarcopenia',c:'#ef4444',cons:`Forza prensile ${v} kg < ${sarco} kg (soglia sarcopenia EWGSOP2). Priorità: rinforzo arti superiori, esercizi con grip (farmer walk, dead hang). Valutare integrazione proteica 1.2-1.6 g/kg/die.`};
    if(v<ref*0.8)return{l:'Sotto la media',c:'#f59e0b',cons:`Forza prensile inferiore alla media per età/sesso (rif. ${ref} kg, Dodds 2014). Inserire esercizi di presa: farmer carry, plate pinch, wrist curl. Progressione con sovraccarico.`};
    if(v<ref*1.1)return{l:'Nella media',c:'#10b981',cons:`Forza prensile nella norma per età e sesso (rif. ${ref} kg). Mantenere con allenamento regolare di forza.`};
    return{l:'Sopra la media',c:'#3b82f6',cons:`Eccellente forza prensile (> media ${ref} kg). Indicatore positivo di forza generale e longevità (Leong 2015).`};
  }else{
    const sarco=a<65?20:16; // EWGSOP2: <16 kg donne anziane
    const ref=a<30?31:a<40?32:a<50?31:a<60?28:a<70?25:a<80?22:18;
    if(v<sarco)return{l:'Sotto soglia sarcopenia',c:'#ef4444',cons:`Forza prensile ${v} kg < ${sarco} kg (soglia sarcopenia EWGSOP2). Priorità: rinforzo globale, esercizi con grip. Valutare apporto proteico ≥1.2 g/kg/die.`};
    if(v<ref*0.8)return{l:'Sotto la media',c:'#f59e0b',cons:`Forza prensile inferiore alla media per età/sesso (rif. ${ref} kg, Dodds 2014). Inserire esercizi di presa e forza arti superiori.`};
    if(v<ref*1.1)return{l:'Nella media',c:'#10b981',cons:`Forza prensile nella norma per età e sesso (rif. ${ref} kg). Mantenere con allenamento regolare.`};
    return{l:'Sopra la media',c:'#3b82f6',cons:`Eccellente forza prensile (> media ${ref} kg). Ottimo indicatore di salute generale.`};
  }
};

// ── 3. Sit-and-Reach — flessibilità ACSM (cm) ──────────────────────────────
const interpSitReach=(cm,sesso)=>{

    if(v<0)return{l:'Sotto la media',c:'#f59e0b',cons:'Flessibilità ridotta. Stretching dinamico pre-allenamento + statico post (hamstring, piriforme, polpacci). Aggiungere yoga/mobilità 2×/settimana.'};
    if(v<17)return{l:'Nella media',c:'#10b981',cons:'Flessibilità nella norma ACSM. Mantenere con stretching regolare post-sessione.'};
    return{l:'Eccellente',c:'#3b82f6',cons:'Ottima flessibilità catena posteriore. Attenzione a ipermobilità — rinforzare core e stabilizzatori.'};

    if(v<-4)return{l:'Molto scarsa',c:'#ef4444',cons:'Flessibilità catena posteriore molto ridotta. Stretching quotidiano: hamstring stretch 3×30s, cat-cow 2×10. Evitare carichi elevati su catena posteriore.'};
    if(v<4)return{l:'Sotto la media',c:'#f59e0b',cons:'Flessibilità ridotta. Stretching dinamico + statico (hamstring, piriforme, polpacci). Yoga/mobilità 2×/settimana.'};

  }
};

// ── 4. BIA — Angolo di Fase (PhA) — Bosy-Westphal 2006 ─────────────────────
const interpPhA=(pha,sesso,eta)=>{
  if(!pha)return null;const v=+pha,m=sesso==='M',a=+eta||50;
  // Ref: Bosy-Westphal A et al. (2006), Norman K et al. (2012)
  const refM=a<30?7.5:a<40?7.3:a<50?7.1:a<60?6.8:a<70?6.3:5.8;
  const refF=a<30?6.6:a<40?6.4:a<50?6.2:a<60?5.9:a<70?5.5:5.1;
  const ref=m?refM:refF;
  const sarcoThresh=m?4.5:3.8; // soglie associate a sarcopenia/malnutrizione
  if(v<sarcoThresh)return{l:'Critico — rischio sarcopenia',c:'#ef4444',cons:`PhA ${v}° molto basso (soglia critica ${sarcoThresh}°). Indica perdita integrità cellulare, possibile sarcopenia o malnutrizione (Norman 2012). Priorità: screening nutrizionale completo, apporto proteico ≥1.5 g/kg/die, allenamento resistenza 3×/settimana. Consultare specialista.`};
  if(v<ref*0.85)return{l:'Sotto la media',c:'#f59e0b',cons:`PhA ${v}° inferiore alla media per età/sesso (rif. ${ref}°, Bosy-Westphal 2006). Possibile riduzione massa cellulare. Aumentare apporto proteico, allenamento di forza progressivo, verificare idratazione.`};
  if(v<ref*1.15)return{l:'Nella norma',c:'#10b981',cons:`PhA ${v}° nella norma (rif. ${ref}°). Buona integrità cellulare e stato nutrizionale. Mantenere allenamento e alimentazione bilanciata.`};
  return{l:'Sopra la media',c:'#3b82f6',cons:`PhA ${v}° eccellente (> media ${ref}°). Indica alta massa cellulare e ottimo stato nutrizionale. Tipico di soggetti allenati.`};
};

// ── 5. BIA — ECW/TBW ratio — Kyle 2004 ─────────────────────────────────────
const interpECW_TBW=(ratio)=>{
  if(!ratio)return null;const v=+ratio;
  // Kyle UG et al. (2004) "Bioelectrical impedance analysis" — norma ECW/TBW 0.36-0.39
  if(v<0.36)return{l:'Ottimo — buona distribuzione idrica',c:'#3b82f6',cons:`ECW/TBW ${v} indica ottima distribuzione idrica intracellulare. Tipico di soggetti ben idratati e con buona massa muscolare.`};
  if(v<=0.39)return{l:'Normale',c:'#10b981',cons:`ECW/TBW ${v} nella norma (0.36-0.39, Kyle 2004). Equilibrio idrico adeguato.`};
  if(v<=0.42)return{l:'Lieve ritenzione',c:'#f59e0b',cons:`ECW/TBW ${v} leggermente elevato. Possibile ritenzione idrica lieve. Ridurre sodio, aumentare potassio (frutta, verdura), camminata quotidiana 30 min, drenaggio linfatico se sedentario. Verificare apporto idrico ≥2L/die.`};
  if(v<=0.45)return{l:'Ritenzione moderata',c:'#fb923c',cons:`ECW/TBW ${v} elevato — ritenzione idrica moderata. Possibili cause: insufficienza venosa, dieta ipersodica, sedentarietà, farmaci. Elevare arti inferiori, compressione graduata, ridurre sodio <2g/die. Consultare medico se persistente.`};
  return{l:'Ritenzione severa',c:'#ef4444',cons:`⚠️ ECW/TBW ${v} molto elevato (>0.45). Edema significativo — consultazione medica necessaria prima di programmare esercizio. Escludere cause cardiache, renali, epatiche.`};
};

let _toastDispatch=null;
function showToast(msg,type='success',duration=4000){if(_toastDispatch)_toastDispatch({msg,type,duration});}
function showConfirmToast(msg,action,duration=5000){if(_toastDispatch)_toastDispatch({msg,type:'confirm',action,duration});}
function showAskToast(msg,onConfirm,duration=8000){if(_toastDispatch)_toastDispatch({msg,type:'ask',action:onConfirm,duration});}

function ToastItem({item,onRemove}){
  const [exiting,setExiting]=React.useState(false);
  const [progress,setProgress]=React.useState(100);
  const isConfirm=item.type==='confirm';
  const isAsk=item.type==='ask';
  const cancelled=React.useRef(false);
  React.useEffect(()=>{
    const start=Date.now();
    const total=item.duration;
    const tick=setInterval(()=>{const elapsed=Date.now()-start;setProgress(Math.max(0,100-(elapsed/total)*100));},50);
    const timer=setTimeout(()=>{
      clearInterval(tick);
      if(isConfirm&&!cancelled.current)item.action();
      setExiting(true);
      setTimeout(()=>onRemove(item.id),300);
    },total);
    return()=>{clearInterval(tick);clearTimeout(timer);};
  },[]);
  const handleCancel=()=>{
    cancelled.current=true;
    onRemove(item.id);
    showToast('Azione annullata','success');
  };
  const closeToast=()=>{setExiting(true);setTimeout(()=>onRemove(item.id),300);};
  const bg=item.type==='error'?C.red:item.type==='warning'?'#f59e0b':item.type==='confirm'?'#f59e0b':isAsk?C.blue:C.green;
  const icon=item.type==='error'?'✕':item.type==='warning'?'⚠':isAsk?'📧':'✓';
  return(
    <div style={{background:C.card,border:`1px solid ${C.border2}`,borderRadius:12,padding:'12px 16px',boxShadow:'0 8px 32px #0004',minWidth:260,maxWidth:360,animation:exiting?'fadeOut .3s ease forwards':'fadeInUp .3s ease',position:'relative',overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:28,height:28,borderRadius:'50%',background:bg+'20',border:`1px solid ${bg}40`,display:'flex',alignItems:'center',justifyContent:'center',color:bg,fontWeight:700,fontSize:14,flexShrink:0}}>{icon}</div>
        <div style={{flex:1,fontSize:13,color:C.text,lineHeight:1.4}}>{item.msg}</div>
        {isConfirm&&<button onClick={handleCancel} style={{background:'#ef444420',color:C.red,border:'1px solid #ef444440',borderRadius:7,padding:'4px 10px',fontSize:12,fontWeight:700,cursor:'pointer',flexShrink:0}}>Annulla</button>}
        {isAsk&&<div style={{display:'flex',gap:6,flexShrink:0}}>
          <button onClick={()=>{cancelled.current=true;closeToast();item.action();}} style={{background:C.blue,color:'#fff',border:'none',borderRadius:7,padding:'4px 10px',fontSize:12,fontWeight:700,cursor:'pointer'}}>Invia</button>
          <button onClick={()=>{cancelled.current=true;closeToast();}} style={{background:'transparent',color:C.muted,border:`1px solid ${C.border2}`,borderRadius:7,padding:'4px 10px',fontSize:12,fontWeight:700,cursor:'pointer'}}>No</button>
        </div>}
        {!isConfirm&&!isAsk&&<button onClick={closeToast} style={{background:'transparent',border:'none',cursor:'pointer',color:C.muted,fontSize:16,padding:'0 2px',lineHeight:1}}>✕</button>}
      </div>
      <div style={{position:'absolute',bottom:0,left:0,height:3,background:bg,width:progress+'%',transition:'width 50ms linear',borderRadius:'0 0 0 12px'}}/>
    </div>
  );
}

function ToastContainer(){
  const [toasts,setToasts]=React.useState([]);
  _toastDispatch=React.useCallback((item)=>{setToasts(t=>[...t,{...item,id:Date.now()+Math.random()}]);},[]);
  const remove=React.useCallback((id)=>setToasts(t=>t.filter(x=>x.id!==id)),[]);
  if(!toasts.length)return null;
  return ReactDOM.createPortal(
    <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',zIndex:9999,display:'flex',flexDirection:'column',gap:8,alignItems:'center',pointerEvents:'none'}}>
      {toasts.map(t=><div key={t.id} style={{pointerEvents:'all'}}><ToastItem item={t} onRemove={remove}/></div>)}
    </div>,
    document.body
  );
}

function StatCard({label,value,sub,color=C.blue,icon,delay,onClick}){
  var numVal=typeof value==='number'?value:parseInt(value,10);
  var isNum=!isNaN(numVal)&&typeof value==='number';
  var ref2=useRef(null);
  var counted=useRef(false);
  var hoverRef=useRef(null);
  useEffect(function(){
    if(!isNum||counted.current||!ref2.current)return;
    counted.current=true;
    var start=0;var end=numVal;var duration=600;var startTime=null;
    function animate(ts){
      if(!startTime)startTime=ts;
      var progress=Math.min((ts-startTime)/duration,1);
      var current=Math.round(progress*end);
      if(ref2.current)ref2.current.textContent=current;
      if(progress<1)requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  },[numVal,isNum]);
  var dl=delay||0;
  return(
    <div ref={hoverRef} onClick={onClick||undefined} onMouseEnter={function(){if(onClick&&hoverRef.current)hoverRef.current.style.borderColor=C.blue;}} onMouseLeave={function(){if(onClick&&hoverRef.current)hoverRef.current.style.borderColor='';}} style={{...S.kpi(color),background:'linear-gradient(135deg,'+color+'08,'+color+'15)',borderLeft:'3px solid '+color,animation:'fadeInUp .3s ease both',animationDelay:dl+'s',cursor:onClick?'pointer':'default',transition:'all .2s'}}>
      {icon&&<div style={{position:'absolute',top:8,right:10,fontSize:32,opacity:0.15,lineHeight:1}}>{icon}</div>}
      <div style={{position:'absolute',top:0,right:0,width:44,height:44,borderRadius:'0 11px 0 44px',background:color+'15'}}/>
      <div style={{fontSize:10,color:C.muted,fontWeight:600,textTransform:'uppercase',letterSpacing:.8,marginBottom:5}}>{label}</div>
      <div ref={ref2} style={{fontSize:28,fontWeight:900,color:C.strong,lineHeight:1}}>{value}</div>
      {sub&&<div style={{fontSize:11,color:color,fontWeight:600,marginTop:3}}>{sub}</div>}
    </div>
  );
}

<div class="grid">

<div class="section">

</div>
<div class="section">
  <div class="section-title">Parametri clinici</div>
  ${[['PA',p.pa],['FC riposo',p.fc?p.fc+' bpm':'—'],['FC max',fcM?fcM+' bpm':'—'],['FC target 60%',fcM?Math.round(fcM*0.6)+' bpm':'—'],['FC target 75%',fcM?Math.round(fcM*0.75)+' bpm':'—'],['Patologie',p.patologie],['Farmaci',p.farmaci]].map(([k,v])=>`<div class="row"><span class="row-label">${esc(k)}</span><span class="row-value">${esc(v)||'—'}</span></div>`).join('')}
</div>
</div>
<div>
<div class="section">
  <div class="section-title">Test funzionali</div>
  ${[['6MWT – Distanza',p.test?.mwtDist?p.test.mwtDist+' m':'—'],['6MWT – RPE',p.test?.mwtRpe||'—'],['6MWT – Sintomi',p.test?.mwtSintomi||'—'],['STS 30s – Rip.',p.test?.stsRip||'—'],['Note',p.test?.noteVal||'—']].map(([k,v])=>`<div class="row"><span class="row-label">${esc(k)}</span><span class="row-value">${esc(v)}</span></div>`).join('')}
</div>
<div class="section">
  <div class="section-title">Stile di vita & obiettivi</div>

</div>
</div>
</div>

${p.programma?.cardio||p.programma?.forza?`
<div class="section">
  <div class="section-title">Programma allenamento</div>
  <div class="grid">
    <div>
      ${[['Inizio',p.programma.dataInizio],['Sedute/sett.',p.programma.sedute],['Min cardio/sett.',p.programma.minCardio?p.programma.minCardio+" min":'—'],['Min forza/sett.',p.programma.minForza?p.programma.minForza+" min":'—']].map(([k,v])=>`<div class="row"><span class="row-label">${k}</span><span class="row-value">${v||'—'}</span></div>`).join('')}
    </div>
    <div>
      ${p.programma.cardio?`<div style="margin-bottom:8px"><div style="font-size:10px;color:#3b82f6;font-weight:700;text-transform:uppercase;margin-bottom:4px">Cardio</div><div class="note-box">${esc(p.programma.cardio)}</div></div>`:''}
      ${p.programma.forza?`<div><div style="font-size:10px;color:#10b981;font-weight:700;text-transform:uppercase;margin-bottom:4px">Forza</div><div class="note-box" style="border-color:#10b981">${esc(p.programma.forza)}</div></div>`:''}
    </div>
  </div>
</div>`:''}

${p.nutrizione?.kcal?`
<div class="section">
  <div class="section-title">Piano nutrizionale</div>
  <div class="grid3" style="margin-bottom:10px">
    <div class="kpi"><div class="kpi-val" style="font-size:16px">${esc(p.nutrizione.kcal)}</div><div class="kpi-lbl">kcal/giorno</div></div>
    <div class="kpi"><div class="kpi-val" style="font-size:16px">${esc(p.nutrizione.proteine)||0}g</div><div class="kpi-lbl">Proteine</div></div>
    <div class="kpi"><div class="kpi-val" style="font-size:16px">${esc(p.nutrizione.carboidrati)||0}g</div><div class="kpi-lbl">Carboidrati</div></div>
  </div>
  ${p.nutrizione.note?`<div class="note-box">${esc(p.nutrizione.note)}</div>`:''}
</div>`:''}

${(p.log||[]).length>0?`
<div class="section">
  <div class="section-title">Ultime sedute (${Math.min(p.log.length,10)})</div>
  ${(p.log||[]).slice().reverse().slice(0,10).map(s=>`
  <div class="log-item">
    <div class="dot" style="background:${s.rpe<=3?'#10b981':s.rpe<=6?'#f59e0b':s.rpe<=8?'#fb923c':'#ef4444'}"></div>
    <div style="flex:1"><span style="font-weight:600">${esc(s.tipo)}</span> <span style="color:#64748b">· ${esc(s.data)} · ${esc(s.durata)} min · RPE ${esc(s.rpe)}</span></div>
    ${s.note?`<div style="font-size:11px;color:#64748b">${esc(s.note)}</div>`:''}
  </div>`).join('')}
</div>`:''}

${(p.progressi||[]).length>1?`
<div class="section">
  <div class="section-title">Storico peso</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    ${p.progressi.map(x=>`<div class="kpi" style="min-width:90px"><div class="kpi-val" style="font-size:15px">${x.peso} kg</div><div class="kpi-lbl">${x.data}</div></div>`).join('')}
  </div>
</div>`:''}

<div class="footer">
  <span>${trainerProfile?.nomeStudio?esc(trainerProfile.nomeStudio):'PT Board'} · Report generato il ${fmtDate()}</span>
  <span>${esc(p.nome)} ${esc(p.cognome)} · ${esc(p.id)}</span>
</div>
</div>${'</body></html>'}`;
    const w=window.open('','_blank');
    w.document.write(html);
    w.document.close();
    // Non auto-stampa — l'utente clicca il bottone manualmente (evita il blocco su iPhone)
  };

  return(
    <div style={{animation:'fadeInUp .3s ease'}}>
      {/* Header cliente */}
      {isMobile?(
        <div style={{marginBottom:14}}>
          {/* Riga 1: indietro + nome + profilo */}

            <Avatar nome={p.nome} cognome={p.cognome} size={42} foto={p.foto||''}/>

              <div style={{fontSize:17,fontWeight:800,color:C.strong,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.nome} {p.cognome}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:2,display:'flex',alignItems:'center',gap:6}}>
                <span>{p.id}</span>
                {pr&&<span style={S.tag(pr.c,pr.bg)}>Profilo {pr.code}</span>}
              </div>
            </div>
          </div>
          {/* Riga 2: bottoni azione ben spaziati */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr 1fr',gap:8}}>
            <button style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'10px 6px',borderRadius:10,border:'1px solid #334155',background:'transparent',cursor:'pointer',color:C.dim,fontSize:11,fontWeight:600}} onClick={onBack}>
              <span style={{fontSize:18}}>←</span><span>Torna</span>
            </button>
            <button style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'10px 6px',borderRadius:10,border:'1px solid #10b98140',background:'#10b98120',cursor:'pointer',color:'#6ee7b7',fontSize:11,fontWeight:600}} onClick={onValuta}>
              <span style={{fontSize:18}}>📋</span><span>Valuta</span>
            </button>
            <button style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'10px 6px',borderRadius:10,border:'1px solid #7c3aed40',background:'#7c3aed20',cursor:'pointer',color:'#c4b5fd',fontSize:11,fontWeight:600}} onClick={()=>{showToast('🤖 AI Coach — Disponibile a breve! Stiamo preparando questa funzionalità.','warning');}}>
              <span style={{fontSize:18}}>🤖</span><span>AI Coach</span>
            </button>
            <button style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'10px 6px',borderRadius:10,border:'1px solid #10b98140',background:'#10b98120',cursor:'pointer',color:'#6ee7b7',fontSize:11,fontWeight:600}} onClick={generaPDF}>
              <span style={{fontSize:18}}>📄</span><span>PDF</span>
            </button>
            <button style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'10px 6px',borderRadius:10,border:`1px solid ${C.border2}`,background:'transparent',cursor:'pointer',color:C.dim,fontSize:11,fontWeight:600}} onClick={onEdit}>
              <span style={{fontSize:18}}>✏️</span><span>Modifica</span>
            </button>
            {p.telefono&&<a href={'https://wa.me/'+p.telefono.replace(/[\s\-\(\)\+]/g,'')+'?text='+encodeURIComponent('Ciao '+p.nome+'! Ti scrivo da PT Board.')} target="_blank" rel="noreferrer" style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'10px 6px',borderRadius:10,border:'1px solid #25D36640',background:'#25D36620',cursor:'pointer',color:'#25D366',fontSize:11,fontWeight:600,textDecoration:'none'}}>
              <span style={{fontSize:18}}>💬</span><span>WhatsApp</span>
            </a>}
          </div>
        </div>
      ):(
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
          <button style={{...S.btn('ghost',true),display:'flex',alignItems:'center',gap:4}} onClick={onBack}>← {T.back}</button>
          <Avatar nome={p.nome} cognome={p.cognome} size={44} foto={p.foto||''}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
              <h1 style={{fontSize:18,fontWeight:800,color:C.strong,margin:0}}>{p.nome} {p.cognome}</h1>
              {pr&&<span style={S.tag(pr.c,pr.bg)}>Profilo {pr.code}</span>}
            </div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>{p.id} · {p.dataValutazione}</div>
          </div>
          <div className="tt"><button onMouseEnter={function(e){e.currentTarget.style.borderColor=C.blue;e.currentTarget.style.color=C.blue;}} onMouseLeave={function(e){e.currentTarget.style.borderColor=C.border2;e.currentTarget.style.color=C.text;}} style={{background:C.card,border:'1px solid '+C.border2,color:C.text,padding:'9px 16px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',transition:'all .2s',display:'flex',alignItems:'center',gap:6}} onClick={onValuta}>📋 Valuta ora</button><span className="tp">Avvia nuova valutazione</span></div>
          <div className="tt"><button onMouseEnter={function(e){e.currentTarget.style.borderColor=C.blue;e.currentTarget.style.color=C.blue;}} onMouseLeave={function(e){e.currentTarget.style.borderColor=C.border2;e.currentTarget.style.color=C.text;}} style={{background:C.card,border:'1px solid '+C.border2,color:C.text,padding:'9px 16px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',transition:'all .2s',display:'flex',alignItems:'center',gap:6}} onClick={generaPDF}>📄 Report PDF</button><span className="tp">Scarica report completo</span></div>
          <div className="tt"><button onMouseEnter={function(e){e.currentTarget.style.borderColor=C.blue;e.currentTarget.style.color=C.blue;}} onMouseLeave={function(e){e.currentTarget.style.borderColor=C.border2;e.currentTarget.style.color=C.text;}} style={{background:C.card,border:'1px solid '+C.border2,color:C.text,padding:'9px 16px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',transition:'all .2s',display:'flex',alignItems:'center',gap:6}} onClick={()=>{showToast('🤖 AI Coach — Disponibile a breve! Stiamo preparando questa funzionalità.','warning');}}>🤖 AI Coach</button><span className="tp">Genera programma con intelligenza artificiale</span></div>
          {p.telefono&&<div className="tt"><a href={'https://wa.me/'+p.telefono.replace(/[\s\-\(\)\+]/g,'')+'?text='+encodeURIComponent('Ciao '+p.nome+'! Ti scrivo da PT Board.')} target="_blank" rel="noreferrer" onMouseEnter={function(e){e.currentTarget.style.borderColor='#25D366';e.currentTarget.style.color='#25D366';}} onMouseLeave={function(e){e.currentTarget.style.borderColor=C.border2;e.currentTarget.style.color=C.text;}} style={{background:C.card,border:'1px solid '+C.border2,color:C.text,padding:'9px 16px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',transition:'all .2s',display:'flex',alignItems:'center',gap:6,textDecoration:'none'}}>💬 WhatsApp</a><span className="tp">Scrivi su WhatsApp</span></div>}
          <div className="tt"><button onMouseEnter={function(e){e.currentTarget.style.borderColor=C.blue;e.currentTarget.style.color=C.blue;}} onMouseLeave={function(e){e.currentTarget.style.borderColor=C.border2;e.currentTarget.style.color=C.text;}} style={{background:C.card,border:'1px solid '+C.border2,color:C.text,padding:'9px 16px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',transition:'all .2s',display:'flex',alignItems:'center',gap:6}} onClick={onEdit}>✏ {T.edit}</button><span className="tp">Modifica cliente</span></div>
          <div className="tt"><button onMouseEnter={function(e){e.currentTarget.style.borderColor=C.blue;e.currentTarget.style.color=C.blue;}} onMouseLeave={function(e){e.currentTarget.style.borderColor=C.border2;e.currentTarget.style.color=C.text;}} style={{background:C.card,border:'1px solid '+C.border2,color:C.text,padding:'9px 16px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',transition:'all .2s',display:'flex',alignItems:'center',gap:6}} onClick={onDelete}>🗑</button><span className="tp">Elimina cliente definitivamente</span></div>
        </div>

      {/* Tabs scorrevoli */}
      <div style={{display:'flex',gap:3,marginBottom:14,background:C.sidebar,borderRadius:9,padding:3,overflowX:'auto',WebkitOverflowScrolling:'touch',scrollbarWidth:'none'}}>
        {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{...S.btn(tab===t.id?'primary':'ghost',true),borderRadius:6,border:'none',whiteSpace:'nowrap',fontSize:isMobile?12:12,padding:isMobile?'6px 12px':'5px 12px',flexShrink:0}}>{t.l}</button>)}
      </div>

      {tab==='dash'&&(
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={S.grid(4)}>
            <StatCard label="Peso" value={`${p.peso} kg`} color={C.blue}/>
            <StatCard label="BMI" value={b} sub={bl} color={bc}/>
            <StatCard label="FC riposo" value={`${p.fc} bpm`} color={C.purple}/>
            <StatCard label="PA" value={p.pa} color={C.pink}/>
          </div>
          <div style={S.grid(3)}>
            <StatCard label="6MWT" value={`${p.test?.mwtDist||'—'} m`} color={C.cyan}/>
            <StatCard label="Sit-to-Stand" value={`${p.test?.stsRip||'—'} rip`} color={C.green}/>
            <StatCard label="Sedute" value={p.log?.length||0} color={C.orange}/>
          </div>
          <div style={S.grid(2)}>
            <div style={S.card}>
              <div style={S.st}>Info cliniche</div>

                <div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:13,padding:'5px 0',borderBottom:`1px solid ${C.border}`}}>
                  <span style={{color:C.muted}}>{k}</span><span style={{color:C.text,fontWeight:500}}>{v||'—'}</span>
                </div>
              ))}
            </div>
            <div style={S.card}>
              <div style={S.st}>Target FC</div>
              {[
                ['Peso target (BMI 24.9)',p.altezza?`${(24.9*(p.altezza/100)**2).toFixed(1)} kg`:'—'],
                ['Calo necessario',p.altezza&&p.peso?`${(p.peso-24.9*(p.altezza/100)**2).toFixed(1)} kg`:'—'],
                ['FC max',fcMax?`${fcMax} bpm`:'—'],
                ['FC target 60%',fcMax?`${Math.round(fcMax*.6)} bpm`:'—'],
                ['FC target 75%',fcMax?`${Math.round(fcMax*.75)} bpm`:'—'],
              ].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:13,padding:'5px 0',borderBottom:`1px solid ${C.border}`}}>
                  <span style={{color:C.muted}}>{k}</span><span style={{color:C.green,fontWeight:600}}>{v}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {tab==='ana'&&(
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {[
            {title:T2.secAna,fields:[['ID',p.id],['Cognome',p.cognome],['Nome',p.nome],['D.d.N.',p.ddn],['Sesso',p.sesso],['Anno nascita',p.annoNascita]]},
            {title:'Parametri antropometrici',fields:[['Altezza',`${p.altezza} cm`],['Peso',`${p.peso} kg`],['BMI',`${b} — ${bl}`],['Vita',`${p.vita} cm`],['Fianchi',`${p.fianchi} cm`],['PA',p.pa],['FC',`${p.fc} bpm`]]},
            {title:'Clinica',fields:[['Patologie',p.patologie],['Farmaci',p.farmaci],['Sintomi',p.sintomiSforzo],['Allergie',p.allergie]]},
            {title:'Stile di vita',fields:[['Attività',p.attivita],['Obiettivo',p.obiettivo],['Preferenze',p.preferenze],['Stress',p.stressPercepito],['Sonno',p.sonno]]},
          ].map(({title,fields})=>(
            <div key={title} style={S.card}>
              <div style={S.st}>{title}</div>
              <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'repeat(3,1fr)',gap:'10px 20px'}}>
                {fields.map(([k,v])=><div key={k}><div style={S.label}>{k}</div><div style={{fontSize:13,color:C.text,padding:'4px 0'}}>{v||'—'}</div></div>)}
              </div>
            </div>
          ))}
        </div>
      )}

      {tab==='test'&&(
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {/* Profilo risultante */}
          <div style={{...S.card,border:'2px solid '+(pr?.c||C.border2)+'40',background:(pr?.c||C.border2)+'08'}}>
            <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:pr?12:0}}>
              {pr?<React.Fragment><span style={{fontSize:40,fontWeight:900,color:pr.c}}>{pr.code}</span><div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'baseline',gap:8}}><div style={{fontSize:16,fontWeight:700,color:C.strong}}>{pr.l}</div><div style={{fontSize:20,fontWeight:900,color:pr.c}}>{pr.score}/100</div></div>
                <div style={{fontSize:12,color:C.muted,marginTop:3}}>Score pesato multi-componente · {p.dataValutazione}</div>
              </div></React.Fragment>
              :<span style={{color:C.muted}}>Inserire risultati test per calcolare il profilo</span>}
            </div>
            {pr&&<React.Fragment><ScoreBar score={pr.score} color={pr.c} height={12}/>
              <div style={{marginTop:12}}><ScoreBreakdown pr={pr} compact={true}/></div>
            </React.Fragment>}
          </div>

          {/* Test principali */}
          <div style={S.grid(2)}>
            <div style={{...S.card,borderLeft:`3px solid ${C.blue}`}}>
              <div style={{fontSize:11,fontWeight:700,color:C.blue,textTransform:'uppercase',marginBottom:8}}>🚶 6MWT</div>
              {[['Distanza',`${p.test?.mwtDist||'—'} m`],['RPE',p.test?.mwtRpe||'—'],['Sintomi',p.test?.mwtSintomi||'—']].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:12,padding:'5px 0',borderBottom:`1px solid ${C.border}`}}><span style={{color:C.muted}}>{k}</span><span style={{color:C.text,fontWeight:600}}>{v}</span></div>
              ))}
              {p.test?.mwtDist&&<div style={{marginTop:8,fontSize:11,fontWeight:700,color:+p.test.mwtDist<300?C.red:+p.test.mwtDist<=450?C.yellow:C.green}}>{+p.test.mwtDist<300?'⚠️ Capacità molto bassa':+p.test.mwtDist<=450?'📊 Capacità moderata':'✅ Buona capacità aerobica'}</div>}
            </div>
            <div style={{...S.card,borderLeft:`3px solid ${C.green}`}}>
              <div style={{fontSize:11,fontWeight:700,color:C.green,textTransform:'uppercase',marginBottom:8}}>🪑 Sit-to-Stand</div>
              {[['Ripetizioni',p.test?.stsRip||'—'],['Note',p.test?.stsNote||'—']].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:12,padding:'5px 0',borderBottom:`1px solid ${C.border}`}}><span style={{color:C.muted}}>{k}</span><span style={{color:C.text,fontWeight:600}}>{v}</span></div>
              ))}
              {p.test?.stsRip&&<div style={{marginTop:8,fontSize:11,fontWeight:700,color:+p.test.stsRip<10?C.red:+p.test.stsRip<=15?C.yellow:C.green}}>{+p.test.stsRip<10?'⚠️ Forza molto ridotta':+p.test.stsRip<=15?'📊 Forza moderata':'✅ Buona forza arti inferiori'}</div>}
            </div>
          </div>

          {/* Test fisici aggiuntivi */}
          {(p.test?.pushupRip||p.test?.plankSec||p.test?.squatRip||p.test?.tugSec||p.test?.slbDx)&&(
            <div style={S.card}>

              return future.map(b=>{

        </div>
      )}

      {tab==='stats'&&(
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
            <div style={S.st}>Progressi peso</div>
            <button style={S.btn('',true)} onClick={()=>setShowPesoModal(true)}>+ Misurazione</button>
          </div>
          <div style={S.card}><LineChartComp data={(p.progressi||[]).map(x=>({x:x.data.slice(0,5),y:x.peso}))} color={C.blue}/></div>
          <div style={S.grid(2)}>
            <div style={S.card}><div style={S.st}>RPE sedute</div><BarChartComp data={(p.log||[]).slice(-10).map(s=>({x:s.data.slice(0,5),y:s.rpe}))} color={C.orange}/></div>
            <div style={S.card}><div style={S.st}>Durata sedute (min)</div><BarChartComp data={(p.log||[]).slice(-10).map(s=>({x:s.data.slice(0,5),y:s.durata}))} color={C.green}/></div>
          </div>
          <div style={S.card}>
            <div style={S.st}>Storico misurazioni</div>
            {(p.progressi||[]).map((x,i)=>(
              <div key={x.data+'-'+i} style={{display:'flex',justifyContent:'space-between',fontSize:13,padding:'6px 0',borderBottom:`1px solid ${C.border}`}}>
                <span style={{color:C.muted}}>{x.data}</span>
                <span style={{color:C.blue,fontWeight:700}}>{x.peso} kg</span>
                <span style={{color:C.muted}}>{x.nota}</span>
                <button style={{...S.btn('danger',true),padding:'2px 7px',fontSize:11}} onClick={()=>upd(x2=>({progressi:x2.progressi.filter((_,ii)=>ii!==i)}))}>✕</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* AI Coach Modal */}
      {showAI&&(
        <div style={{position:'fixed',inset:0,background:'#000000c0',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
          <div style={{background:'#0f1623',border:'1px solid #7c3aed50',borderRadius:16,width:'min(680px,95vw)',maxHeight:'88vh',overflowY:'auto',display:'flex',flexDirection:'column'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 22px',borderBottom:'1px solid #1e2d47'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:20}}>🤖</span>
                <div>
                  <div style={{fontSize:15,fontWeight:800,color:'#f8fafc'}}>AI Coach</div>
                  <div style={{fontSize:11,color:'#64748b'}}>{p.nome} {p.cognome}</div>
                </div>
              </div>
              <button onClick={()=>setShowAI(false)} style={{background:'none',border:'none',color:'#64748b',fontSize:20,cursor:'pointer'}}>✕</button>
            </div>
            <div style={{padding:28,flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',gap:16}}>
              <div style={{fontSize:48}}>🔒</div>
              <div style={{fontSize:18,fontWeight:800,color:'#f8fafc'}}>Funzionalità Pro</div>
              <div style={{fontSize:13,color:'#94a3b8',lineHeight:1.8,maxWidth:380}}>
                L'AI Coach è disponibile esclusivamente per gli utenti con piano <strong style={{color:'#a78bfa'}}>Pro</strong>.<br/>
                Genera programmi personalizzati in pochi secondi grazie all'intelligenza artificiale.
              </div>
              <div style={{background:'#7c3aed15',border:'1px solid #7c3aed40',borderRadius:12,padding:'14px 20px',fontSize:12,color:'#c4b5fd',lineHeight:1.7,maxWidth:360}}>
                ✨ <strong>Cosa include l'AI Coach:</strong><br/>
                🎯 Obiettivo prioritario personalizzato<br/>
                📅 Schema settimanale completo<br/>
                💪 Esercizi con serie e ripetizioni<br/>
                🥗 Consigli nutrizionali<br/>
                ⚠️ Precauzioni per il cliente
              </div>
              <button onClick={()=>{setShowAI(false);onUpgrade();}} style={{marginTop:8,padding:'12px 28px',borderRadius:10,border:'none',background:'linear-gradient(135deg,#7c3aed,#3b82f6)',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
                💎 Passa al piano Pro
              </button>
            </div>
          </div>
        </div>
      )}

      {showBookingModal&&<Modal title="Prenota seduta" onClose={()=>setShowBookingModal(false)}>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <FF label="Data" name="data" type="date" value={newSeduta.data} onChange={e=>setNewSeduta(f=>({...f,data:e.target.value}))}/>
          <FF label="Ora" name="ora" type="time" value={newSeduta.ora} onChange={e=>setNewSeduta(f=>({...f,ora:e.target.value}))}/>
          <FF label="Tipo seduta" name="tipo" value={newSeduta.tipo} onChange={e=>setNewSeduta(f=>({...f,tipo:e.target.value}))} options={['Camminata lenta','Camminata svelto','Forza base','Forza intermedia','Forza avanzata','Cardio moderato','Cardio intenso','HIIT','Mobilità/stretching']}/>
          <FF label="Durata (min)" name="durata" type="number" value={newSeduta.durata} onChange={e=>setNewSeduta(f=>({...f,durata:e.target.value}))}/>
          <FF label="Note" name="note" type="textarea" value={newSeduta.note} onChange={e=>setNewSeduta(f=>({...f,note:e.target.value}))}/>
        </div>
        <div style={{display:'flex',gap:8,marginTop:16,justifyContent:'flex-end'}}>
          <button style={S.btn('ghost')} onClick={()=>setShowBookingModal(false)}>{gT().cancel}</button>

        </div>
        <div style={{display:'flex',gap:8,marginTop:16,justifyContent:'flex-end'}}>
          <button style={S.btn('ghost')} onClick={()=>setShowPesoModal(false)}>{gT().cancel}</button>
          <button style={S.btn()} onClick={addPeso}>{gT().save}</button>
        </div>

      {showSchedaModal&&<SchedaModal exercises={exercises} onSave={(s)=>{upd(x=>({schede:(x.schede||[]).concat([s])}));setShowSchedaModal(false)}} onClose={()=>setShowSchedaModal(false)}/>}
    </div>
  );
}

function SchedaModal({exercises,onSave,onClose}){
  const [form,setForm]=useState({nome:'',tipo:'Forza',data:fmtDate(),esercizi:[],note:''});
  const [addEx,setAddEx]=useState({eId:'',serie:3,reps:12,peso:'',rec:60});
  const upd=e=>setForm(f=>({...f,[e.target.name]:e.target.value}));
  return(
    <Modal title="Nuova scheda allenamento" onClose={onClose} width="660px">
      <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 1fr 1fr',gap:12,marginBottom:16}}>
        <FF label="Nome scheda" name="nome" value={form.nome} onChange={upd}/>
        <FF label="Tipo" name="tipo" value={form.tipo} onChange={upd} options={['Forza','Cardio','Funzionale','Mobilità','Full Body','Upper','Lower','HIIT']}/>
        <FF label="Data" name="data" value={form.data} onChange={upd}/>
      </div>
      <div style={{...S.card,marginBottom:14}}>
        <div style={S.st}>Aggiungi esercizio</div>
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr',gap:8,alignItems:'end'}}>
          <FF label="Esercizio" name="eId" value={addEx.eId} onChange={e=>setAddEx(f=>({...f,eId:e.target.value}))} options={[{v:'',l:'-- Scegli --'}].concat(exercises.map(e=>({v:e.id,l:e.nome+' ('+e.cat+')'})))}/>
          <FF label="Serie" name="serie" type="number" value={addEx.serie} onChange={e=>setAddEx(f=>({...f,serie:+e.target.value}))}/>
          <FF label="Rip." name="reps" type="number" value={addEx.reps} onChange={e=>setAddEx(f=>({...f,reps:+e.target.value}))}/>
          <FF label="Peso kg" name="peso" value={addEx.peso} onChange={e=>setAddEx(f=>({...f,peso:e.target.value}))}/>
          <FF label="Rec. (s)" name="rec" type="number" value={addEx.rec} onChange={e=>setAddEx(f=>({...f,rec:+e.target.value}))}/>
        </div>
        <button style={{...S.btn('success',true),marginTop:8}} onClick={()=>{if(addEx.eId){setForm(f=>({...f,esercizi:[...f.esercizi,{...addEx}]}));setAddEx({eId:'',serie:3,reps:12,peso:'',rec:60})}}}>+ Aggiungi</button>
      </div>
      {form.esercizi.length>0&&(
        <div style={{marginBottom:14}}>
          <div style={S.st}>Esercizi ({form.esercizi.length})</div>
          {form.esercizi.map((ex,i)=>{
            const info=exercises.find(e=>e.id===ex.eId);
            return(
              <div key={ex.eId+'-'+i} style={{...S.row,border:`1px solid ${C.border2}`,borderRadius:8,marginBottom:5}}>
                <span style={{fontSize:12,color:C.blue,fontWeight:700,minWidth:20}}>{i+1}</span>
                <span style={{flex:1,fontSize:13,color:C.strong}}>{info?.nome}</span>
                <span style={{fontSize:12,color:C.muted}}>{ex.serie}×{ex.reps}{ex.peso?` @ ${ex.peso}kg`:''} · rec {ex.rec}s</span>
                <button style={{...S.btn('danger',true),padding:'2px 7px'}} onClick={()=>setForm(f=>({...f,esercizi:f.esercizi.filter((_,ii)=>ii!==i)}))}>✕</button>
              </div>
            );
          })}
        </div>
      )}
      <FF label="Note scheda" name="note" type="textarea" value={form.note} onChange={upd}/>
      <div style={{display:'flex',gap:8,marginTop:16,justifyContent:'flex-end'}}>
        <button style={S.btn('ghost')} onClick={onClose}>{gT().cancel}</button>
        <button style={S.btn()} onClick={()=>form.nome&&onSave(form)}>Salva scheda</button>
      </div>
    </Modal>
  );
}

function CalendarView({patients,bookings,setBookings,T,trainerProfile}){
  const [weekOffset,setWeekOffset]=useState(0);
  const [showModal,setShowModal]=useState(false);
  const [viewBooking,setViewBooking]=useState(null);
  const [newB,setNewB]=useState({patientId:'',data:'',ora:'09:00',durata:60,tipo:'PT',note:'',stato:'Confermato'});
  const [bTouched,setBTouched]=useState({});
  const [emailSending,setEmailSending]=useState(false);
  const touchB=n=>setBTouched(t=>({...t,[n]:true}));
  const bErr=field=>{
    if(!bTouched[field])return null;
    if(field==='patientId'&&!newB.patientId)return'Seleziona un cliente';
    if(field==='data'&&!newB.data)return'Data obbligatoria';
    if(field==='ora'&&!newB.ora)return'Ora obbligatoria';
    return null;
  };
  const canBook=newB.patientId&&newB.data&&newB.ora;

  const getWeekDays=()=>{
    const d=new Date();d.setDate(d.getDate()-d.getDay()+1+weekOffset*7);
    return Array.from({length:7},(_,i)=>{const x=new Date(d);x.setDate(d.getDate()+i);return x});
  };
  const days=getWeekDays();
  const hours=['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00'];

  const saveBooking=()=>{
    const bk={...newB,id:'B'+Date.now()};
    setBookings(prev=>[...prev,bk]);
    setShowModal(false);
    setNewB({patientId:'',data:'',ora:'09:00',durata:60,tipo:'PT',note:'',stato:'Confermato'});
    setBTouched({});
    const pat=patients.find(x=>x.id===newB.patientId);
    if(pat)askSendEmail({pat,subject:'Conferma prenotazione',message:'La tua seduta è confermata!\n\n📅 '+fmtDateIT(newB.data)+'\n🕐 Ore '+newB.ora+'\n💪 '+newB.tipo+' — '+newB.durata+' minuti\n\nTi aspetto! Se hai bisogno di spostare o annullare, contattami.\n\n[nomeMittente]',trainerProfile});
  };

  return(
    <div>
      <h1 style={{fontSize:22,fontWeight:800,color:C.strong,fontFamily:'Syne,sans-serif',marginBottom:16}}>Prenota la tua seduta</h1>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div className="tt"><button style={S.btn('ghost',true)} onClick={()=>setWeekOffset(w=>w-1)}>‹</button><span className="tp">Settimana precedente</span></div>
          <span style={{fontSize:14,fontWeight:700,color:C.strong}}>
            {days[0].toLocaleDateString('it-IT',{day:'2-digit',month:'short'})} — {days[6].toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'})}
          </span>
          <div className="tt"><button style={S.btn('ghost',true)} onClick={()=>setWeekOffset(w=>w+1)}>›</button><span className="tp">Settimana successiva</span></div>
          <button style={{...S.btn('ghost',true),fontSize:11}} onClick={()=>setWeekOffset(0)}>Oggi</button>
        </div>
        <div className="tt"><button style={S.btn()} onClick={()=>setShowModal(true)}>+ Prenota</button><span className="tp">Prenota una nuova seduta</span></div>
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border2}`,borderRadius:12,overflow:'hidden'}}>
        <div style={{display:'grid',gridTemplateColumns:'60px repeat(7,1fr)',borderBottom:`1px solid ${C.border2}`}}>
          <div/>
          {days.map((d,i)=>{
            const isToday=d.toDateString()===new Date().toDateString();
            return(
              <div key={d.toISOString()} style={{padding:'10px 4px',textAlign:'center',borderLeft:`1px solid ${C.border}`}}>
                <div style={{fontSize:11,color:C.muted,fontWeight:600}}>{DAYS[i]}</div>
                <div style={{fontSize:16,fontWeight:800,color:isToday?C.blue:C.strong,marginTop:2}}>{d.getDate()}</div>
                <div style={{fontSize:10,color:C.muted}}>{MONTHS[d.getMonth()]}</div>
              </div>
            );
          })}
        </div>
        <div style={{overflowY:'auto',maxHeight:'calc(100vh - 260px)'}}>
          {hours.map(h=>(
            <div key={h} style={{display:'grid',gridTemplateColumns:'60px repeat(7,1fr)',borderBottom:`1px solid ${C.border}`,minHeight:50}}>
              <div style={{padding:'4px 8px',fontSize:11,color:C.muted,borderRight:`1px solid ${C.border2}`,display:'flex',alignItems:'center'}}>{h}</div>
              {days.map((d,di)=>{
                const dateStr=d.toISOString().slice(0,10);
                const slot=bookings.filter(b=>b.data===dateStr&&b.ora&&b.ora.slice(0,2)===h.slice(0,2));
                return(
                  <div key={di} style={{borderLeft:`1px solid ${C.border}`,padding:3}}>
                    {slot.map(b=>{
                      const pat=patients.find(x=>x.id===b.patientId);
                      return(
                        <div key={b.id} style={{background:b.completed?C.green+'25':C.blue+'25',border:`1px solid ${b.completed?C.green+'50':C.blue+'50'}`,borderRadius:5,padding:'3px 6px',cursor:'pointer'}}
                          onClick={function(){setViewBooking(b);}}>
                          <div style={{fontSize:11,fontWeight:700,color:b.completed?C.green:C.blue,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.completed?'✅ ':''}{pat?.nome} {pat?.cognome?.slice(0,1)}.</div>
                          <div style={{fontSize:10,color:C.muted}}>{b.durata}' · {b.tipo}</div>
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>
      {(function(){
        var today=new Date();
        var todayStr=today.toISOString().slice(0,10);
        var dayBookings=bookings.filter(function(b){return b.data===todayStr;}).sort(function(a,b2){return(a.ora||'').localeCompare(b2.ora||'');});
        if(dayBookings.length===0)return null;
        return(
          <div style={{...S.card,marginTop:14}}>
            <div style={S.st}>Appuntamenti di oggi ({dayBookings.length})</div>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {dayBookings.map(function(b){
                var pat=patients.find(function(x){return x.id===b.patientId;});
                return(
                  <div key={b.id} onClick={function(){setViewBooking(b);}} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',background:b.completed?C.green+'15':C.bg,borderRadius:8,cursor:'pointer',border:'1px solid '+(b.completed?C.green+'50':C.border2)}}>
                    <div style={{fontSize:14,fontWeight:800,color:b.completed?C.green:C.blue,minWidth:50}}>{b.ora||'--:--'}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700,color:C.strong}}>{b.completed?'✅ ':''}{pat?pat.nome+' '+pat.cognome:'Cliente sconosciuto'}</div>
                      <div style={{fontSize:11,color:C.muted}}>{b.tipo} · {b.durata} min</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}
      {viewBooking&&(function(){
        var vb=viewBooking;
        var pat=patients.find(function(x){return x.id===vb.patientId;});
        return(
          <Modal title="Dettaglio Appuntamento" onClose={function(){setViewBooking(null);}}>
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:40,height:40,borderRadius:10,background:C.blue+'20',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>👤</div>
                <div>
                  <div style={{fontSize:15,fontWeight:700,color:C.strong}}>{pat?pat.nome+' '+pat.cognome:'Cliente sconosciuto'}</div>
                  <div style={{fontSize:12,color:C.muted}}>{pat?.id||''}</div>
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div style={{background:C.bg,borderRadius:8,padding:'10px 12px'}}><div style={{fontSize:10,color:C.muted,marginBottom:3}}>Data</div><div style={{fontSize:14,fontWeight:700,color:C.strong}}>{vb.data}</div></div>
                <div style={{background:C.bg,borderRadius:8,padding:'10px 12px'}}><div style={{fontSize:10,color:C.muted,marginBottom:3}}>Ora</div><div style={{fontSize:14,fontWeight:700,color:C.strong}}>{vb.ora}</div></div>
                <div style={{background:C.bg,borderRadius:8,padding:'10px 12px'}}><div style={{fontSize:10,color:C.muted,marginBottom:3}}>Tipo seduta</div><div style={{fontSize:14,fontWeight:700,color:C.strong}}>{vb.tipo}</div></div>
                <div style={{background:C.bg,borderRadius:8,padding:'10px 12px'}}><div style={{fontSize:10,color:C.muted,marginBottom:3}}>Durata</div><div style={{fontSize:14,fontWeight:700,color:C.strong}}>{vb.durata} min</div></div>
              </div>
              {vb.note&&<div style={{background:C.bg,borderRadius:8,padding:'10px 12px'}}><div style={{fontSize:10,color:C.muted,marginBottom:3}}>Note</div><div style={{fontSize:13,color:C.text,lineHeight:1.6}}>{vb.note}</div></div>}
            </div>
            <div style={{marginTop:20,display:'flex',flexDirection:'column',gap:8}}>
              {pat?.email&&(
                <button disabled={emailSending} onClick={async function(){
                  const nomeMittente=trainerProfile?.nomeStudio||(trainerProfile?.nome?(trainerProfile.nome+(trainerProfile.cognome?' '+trainerProfile.cognome:''))+' via PT Board':null)||'PT Board';
                  setEmailSending(true);
                  const res=await sendEmail({toEmail:pat.email,toName:pat.nome+' '+pat.cognome,subject:'Promemoria appuntamento - '+nomeMittente,message:'Ti ricordo il tuo appuntamento:\n\n📅 '+fmtDateIT(vb.data)+'\n🕐 Ore '+vb.ora+'\n💪 '+vb.tipo+' — '+vb.durata+' minuti\n\nA presto!\n\n'+nomeMittente,fromName:nomeMittente});
                  setEmailSending(false);
                  if(res.ok)showToast('Email inviata a '+pat.email,'success');
                  else showToast('Errore invio: '+res.err,'error');
                }} style={{background:C.blue,color:'#fff',width:'100%',padding:12,borderRadius:10,fontWeight:700,fontSize:14,border:'none',cursor:emailSending?'not-allowed':'pointer',opacity:emailSending?0.7:1}}>
                  {emailSending?'Invio...':'📧 Invia promemoria'}
                </button>
              )}
              <button onClick={function(){showConfirmToast('Annullare questo appuntamento? Verrà eliminato tra 5 secondi.',function(){setBookings(function(prev){return prev.filter(function(x){return x.id!==vb.id;});});setViewBooking(null);if(pat)askSendEmail({pat,subject:'Appuntamento annullato',message:'Il tuo appuntamento del '+fmtDateIT(vb.data)+' alle '+vb.ora+' è stato annullato.\n\nContattami per riprogrammare quando vuoi.\n\n[nomeMittente]',trainerProfile});});}} style={{background:C.red,color:'#fff',width:'100%',padding:12,borderRadius:10,fontWeight:700,fontSize:14,border:'none',cursor:'pointer'}}>Annulla appuntamento</button>
            </div>
          </Modal>
        );
      })()}
      {showModal&&(
        <Modal title="Nuova prenotazione" onClose={()=>setShowModal(false)}>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <FF label="Cliente" name="patientId" value={newB.patientId} onChange={e=>setNewB(f=>({...f,patientId:e.target.value}))} options={[{v:'',l:'-- Seleziona cliente --'}].concat(patients.map(p=>({v:p.id,l:p.nome+' '+p.cognome})))} onBlur={()=>touchB('patientId')} error={bErr('patientId')}/>
            <div style={S.grid(2)}>
              <FF label="Data" name="data" type="date" value={newB.data} onChange={e=>setNewB(f=>({...f,data:e.target.value}))} onBlur={()=>touchB('data')} error={bErr('data')}/>
              <FF label="Ora" name="ora" type="time" value={newB.ora} onChange={e=>setNewB(f=>({...f,ora:e.target.value}))} onBlur={()=>touchB('ora')} error={bErr('ora')}/>
              <FF label="Durata (min)" name="durata" type="number" value={newB.durata} onChange={e=>setNewB(f=>({...f,durata:+e.target.value}))}/>
              <FF label="Tipo" name="tipo" value={newB.tipo} onChange={e=>setNewB(f=>({...f,tipo:e.target.value}))} options={['PT','Valutazione','Follow-up','Corpo libero','Pesi']}/>
            </div>
            <FF label="Note" name="note" type="textarea" value={newB.note} onChange={e=>setNewB(f=>({...f,note:e.target.value}))}/>
          </div>
          <div style={{display:'flex',gap:8,marginTop:16,justifyContent:'flex-end'}}>
            <button style={S.btn('ghost')} onClick={()=>setShowModal(false)}>{gT().cancel}</button>
            <div className="tt">
              <button style={{...S.btn(),...(!canBook?{opacity:0.5,cursor:'not-allowed'}:{})}} onClick={()=>{if(canBook)saveBooking();else{touchB('patientId');touchB('data');touchB('ora');}}}>Prenota</button>
              {!canBook&&<span className="tp">Compila cliente, data e ora</span>}
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── ESERCIZI ──────────────────────────────────────────────────────────────────
function ExercisesPage({exercises,setExercises,T}){
  const [showModal,setShowModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({nome:'',cat:'Forza',muscoli:'',desc:''});
  const [filter,setFilter]=useState('Tutti');
  const upd=e=>setForm(f=>({...f,[e.target.name]:e.target.value}));
  const cats=['Tutti'].concat(Array.from(new Set(exercises.map(e=>e.cat))));
  const filtered=filter==='Tutti'?exercises:exercises.filter(e=>e.cat===filter);
  const openAdd=()=>{setForm({nome:'',cat:'Forza',muscoli:'',desc:''});setEditing(null);setShowModal(true)};
  const openEdit=(ex)=>{setForm({...ex});setEditing(ex.id);setShowModal(true)};
  const save=()=>{
    if(editing)setExercises(es=>es.map(e=>e.id===editing?{...form,id:editing}:e));
    else setExercises(es=>[...es,{...form,id:'E'+Date.now()}]);
    setShowModal(false);
  };
  const catColors={Forza:C.blue,Cardio:C.green,Core:C.orange,Mobilità:C.teal,Funzionale:C.purple};
  return(
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <h1 style={{fontSize:20,fontWeight:800,color:C.strong}}>Libreria Esercizi</h1>
        <button style={S.btn()} onClick={openAdd}>{T.exNew}</button>
      </div>
      <div style={{display:'flex',gap:6,marginBottom:14}}>
        {cats.map(c=><button key={c} style={S.btn(filter===c?'primary':'ghost',true)} onClick={()=>setFilter(c)}>{c}</button>)}
      </div>
      <div style={S.grid(3)}>
        {filtered.map(ex=>(
          <div key={ex.id} style={{...S.card,border:`1px solid ${catColors[ex.cat]||C.border2}30`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
              <div><div style={{fontSize:13,fontWeight:700,color:C.strong,marginBottom:4}}>{ex.nome}</div><span style={S.tag(catColors[ex.cat]||C.muted)}>{ex.cat}</span></div>
              <div style={{display:'flex',gap:4}}>
                <button style={{...S.btn('ghost',true),padding:'3px 7px'}} onClick={()=>openEdit(ex)}>✏</button>
                <button style={{...S.btn('danger',true),padding:'3px 7px'}} onClick={()=>setExercises(es=>es.filter(e=>e.id!==ex.id))}>✕</button>
              </div>
            </div>
            <div style={{fontSize:11,color:C.muted,marginBottom:4}}><b style={{color:C.cyan}}>Muscoli:</b> {ex.muscoli}</div>
            <div style={{fontSize:12,color:C.dim,lineHeight:1.5}}>{ex.desc}</div>
          </div>
        ))}
      </div>
      {showModal&&(
        <Modal title={editing?'Modifica esercizio':'Nuovo esercizio'} onClose={()=>setShowModal(false)}>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <FF label="Nome" name="nome" value={form.nome} onChange={upd}/>
            <div style={S.grid(2)}>
              <FF label="Categoria" name="cat" value={form.cat} onChange={upd} options={['Forza','Cardio','Core','Mobilità','Funzionale']}/>
              <FF label="Muscoli" name="muscoli" value={form.muscoli} onChange={upd}/>
            </div>
            <FF label="Descrizione / note tecniche" name="desc" type="textarea" value={form.desc} onChange={upd}/>
          </div>
          <div style={{display:'flex',gap:8,marginTop:16,justifyContent:'flex-end'}}>
            <button style={S.btn('ghost')} onClick={()=>setShowModal(false)}>{gT().cancel}</button>
            <button style={S.btn()} onClick={save}>{gT().save}</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── FORM CLIENTE ─────────────────────────────────────────────────────────────
function PatientForm({initial,onSave,onCancel,isNew}){const TF=gT();
  const [form,setForm]=useState(initial);
  const [touched,setTouched]=useState({});
  const touch=n=>setTouched(t=>({...t,[n]:true}));
  const b=bmi(form.peso,form.altezza);
  const pr=profilo(form.test?.mwtDist,form.test?.stsRip,form.sesso,form.test,{biaFM:form.bia?.FM});
  const upd=e=>setForm(f=>({...f,[e.target.name]:e.target.value}));
  const updT=e=>setForm(f=>({...f,test:{...f.test,[e.target.name]:e.target.value}}));
  const updP=e=>setForm(f=>({...f,programma:{...f.programma,[e.target.name]:e.target.value}}));
  const updN=e=>setForm(f=>({...f,nutrizione:{...f.nutrizione,[e.target.name]:e.target.value}}));
  const fmtErr=(field)=>{
    if(!touched[field])return null;
    if(field==='cognome'&&!form.cognome?.trim())return'Campo obbligatorio';
    if(field==='nome'&&!form.nome?.trim())return'Campo obbligatorio';
    if(field==='peso'&&form.peso){const v=+form.peso;if(isNaN(v)||v<=0||v>=500)return'Inserisci un peso valido (1-500 kg)';}
    if(field==='altezza'&&form.altezza){const v=+form.altezza;if(isNaN(v)||v<=50||v>=300)return'Inserisci un\'altezza valida (50-300 cm)';}
    if(field==='email'&&form.email&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email))return'Email non valida';
    if(field==='telefono'&&form.telefono&&(!/^\+/.test(form.telefono.trim())||form.telefono.replace(/\D/g,'').length<8))return"Inserisci un numero valido con prefisso (es: +39...)";
    if(field==='ddn'&&form.ddn){const p=form.ddn.split('/');if(p.length===3&&p[2]?.length===4){const d=new Date(+p[2],+p[1]-1,+p[0]);if(d>new Date())return'Data non valida';}}
    if(field==='fc'&&form.fc){const v=+form.fc;if(isNaN(v)||v<20||v>250)return'Valore FC non realistico';}
    return null;
  };
  const canSave=form.cognome?.trim()&&form.nome?.trim();
  return(
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
        <h1 style={{fontSize:18,fontWeight:800,color:C.strong}}>{isNew?'Nuovo cliente':`Modifica — ${form.nome} ${form.cognome}`}</h1>
        <div style={{display:'flex',gap:8}}>
          <button style={S.btn('ghost')} onClick={onCancel}>{gT().cancel}</button>
          <div className="tt">
            <button style={{...S.btn(),...(!canSave?{opacity:0.5,cursor:'not-allowed'}:{})}} onClick={()=>{if(canSave)onSave(form);else{touch('cognome');touch('nome');}}} >✓ Salva</button>
            {!canSave&&<span className="tp">Compila i campi obbligatori</span>}
          </div>
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <div style={S.card}>
          <div style={S.st}>Dati anagrafici</div>
          <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:12}}>
            <div title="Clicca per caricare foto" onClick={()=>document.getElementById('foto-upload-input').click()} style={{width:80,height:80,borderRadius:'50%',cursor:'pointer',overflow:'hidden',flexShrink:0,border:`2px dashed ${C.border2}`,display:'flex',alignItems:'center',justifyContent:'center',background:C.bg}}>
              {form.foto?<img src={form.foto} alt="foto" style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<Avatar nome={form.nome||'?'} cognome={form.cognome||'?'} size={76}/>}
            </div>
            <div>
              <div style={{fontSize:12,color:C.dim,marginBottom:4}}>Foto profilo</div>
              <button type="button" style={{...S.btn('ghost'),fontSize:11,padding:'4px 10px'}} onClick={()=>document.getElementById('foto-upload-input').click()}>📷 Carica foto</button>
              {form.foto&&<button type="button" style={{...S.btn('ghost'),fontSize:11,padding:'4px 10px',marginLeft:6,color:'#ef4444'}} onClick={()=>setForm(f=>({...f,foto:''}))}>✕ Rimuovi</button>}
            </div>
            <input id="foto-upload-input" type="file" accept="image/*" style={{display:'none'}} onChange={e=>{const file=e.target.files?.[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{const img=new Image();img.onload=()=>{const max=150;const scale=Math.min(1,max/Math.max(img.width,img.height));const w=Math.round(img.width*scale);const h=Math.round(img.height*scale);const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);setForm(f=>({...f,foto:canvas.toDataURL('image/jpeg',0.7)}));};img.src=ev.target.result;};reader.readAsDataURL(file);e.target.value='';}}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'repeat(3,1fr)',gap:12}}>
            <FF label="Cognome *" name="cognome" value={form.cognome} onChange={upd} required onBlur={()=>touch('cognome')} error={fmtErr('cognome')}/>
            <FF label="Nome *" name="nome" value={form.nome} onChange={upd} required onBlur={()=>touch('nome')} error={fmtErr('nome')}/>

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(undefined);
  const [profile,setProfile]=useState(null);

  const loadProfile=async(u)=>{
    if(!u){setProfile(null);return;}
    const p=await fbGetUserProfile(u.uid);
    setProfile(p);
  };

  useEffect(()=>{
    let done=false;
    const timeout=setTimeout(()=>{if(!done){done=true;setUser(null);}},5000);
    try{
      const unsub=fbAuth.onAuthStateChanged(async u=>{
        if(!done){done=true;clearTimeout(timeout);}
        setUser(u);
        await loadProfile(u);
      });
      return()=>{clearTimeout(timeout);try{unsub();}catch(e){}};
    }catch(e){clearTimeout(timeout);setUser(null);}
  },[]);

  if(user===undefined) return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',background:'#07090f',gap:16}}>
      <div style={{fontSize:32,fontWeight:900,color:'#3b82f6'}}>PT Board</div>
      <div style={{width:36,height:36,border:'3px solid #334155',borderTop:'3px solid #3b82f6',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  if(!user) return <AuthScreen onProfileReady={p=>setProfile(p)}/>;
  if(profile?.plan==='blocked') return <PaywallScreen user={user} profile={profile} blocked/>;
  if(isTrialExpired(profile)) return <PaywallScreen user={user} profile={profile}/>;
  return <AppInner user={user} profile={profile} trialLeft={trialDaysLeft(profile)}/>;
}

      const m=window.innerWidth<=768;

    };
    window.addEventListener('resize',onResize);
    window.addEventListener('orientationchange',onResize);
    return()=>{window.removeEventListener('resize',onResize);window.removeEventListener('orientationchange',onResize);};
  },[]);

  // Carica dati da Firebase in background (non blocca l'app)
  useEffect(()=>{
    setSyncing(true);
    fbLoad(user.uid).then(remote=>{
      if(remote&&remote.dataVersion>=4){
        if(remote.patients?.length) setPatients(remote.patients);
        if(remote.bookings) setBookings(remote.bookings);
        if(remote.exercises) setExercises(remote.exercises);
        if(remote.isLight!==undefined) setIsLight(remote.isLight);
      }
    }).catch(()=>{}).finally(()=>setSyncing(false));
    if(typeof Notification!=='undefined'&&Notification.permission==='default') Notification.requestPermission();
  },[]);

  // Applica tema
  useEffect(()=>{
    if(isLight) document.documentElement.classList.add('light');
    else document.documentElement.classList.remove('light');
  },[isLight]);

  // Salva su localStorage + Firebase
  useEffect(()=>{
    if(firstLoad.current){firstLoad.current=false;return;}
    const data={patients,bookings,exercises,isLight,dataVersion:4};

      save(data);
      try{fbSave(user.uid,data);}catch{}

    const onVis=()=>{if(document.hidden)handleHide();};
    document.addEventListener('visibilitychange',onVis);
    window.addEventListener('pagehide',handleHide);
    window.addEventListener('beforeunload',handleHide);
    return()=>{
      document.removeEventListener('visibilitychange',onVis);
      window.removeEventListener('pagehide',handleHide);

function ScoreBreakdown({pr,compact}){
  if(!pr)return null;
  return(
    <div style={{display:'flex',flexDirection:'column',gap:compact?6:10}}>
      {pr.components.map(comp=>{
        const barC=comp.score>=70?C.green:comp.score>=40?C.yellow:C.red;
        return(
          <div key={comp.id}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
              <div style={{fontSize:compact?11:12,fontWeight:600,color:C.text}}>{comp.icon} {comp.label}</div>
              <div style={{fontSize:compact?10:11,color:C.muted}}>{comp.val} — <span style={{fontWeight:700,color:barC}}>{comp.score}/100</span> (peso {comp.w}%)</div>
            </div>
            <ScoreBar score={comp.score} color={barC} height={compact?8:10}/>
          </div>
        );
      })}
      {pr.missing&&pr.missing.length>0&&(
        <div style={{background:C.yellow+'12',border:'1px solid '+C.yellow+'30',borderRadius:8,padding:'8px 12px',marginTop:2}}>
          <div style={{fontSize:11,fontWeight:700,color:C.yellow}}>Dati mancanti per uno score piu preciso:</div>

        </div>
      )}
    </div>
  );
}
