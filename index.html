// ‚îÄ‚îÄ CLASSIFICAZIONE PESATA SCIENTIFICA ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
const calcScore=(test,sesso,extra)=>{
  // test = {mwtDist, stsRip, handgrip, tugSec, biaFM/massaGrassa, ...}
  // extra = {biaFM} from bia object or massaGrassa from test
  const m=sesso==='M';
  const components=[];
  // 1. CAPACIT√Ä AEROBICA (peso 40%) ‚Äî 6MWT
  if(test?.mwtDist&&+test.mwtDist>0){
    const d=+test.mwtDist;
    const s=d>550?100:d>=451?75:d>=300?50:25;
    components.push({id:'aerobica',label:'Capacita aerobica (6MWT)',w:40,score:s,val:d+'m',icon:'üö∂'});
  }
  // 2. FORZA (peso 30%) ‚Äî media STS + Handgrip
  const stsS=test?.stsRip&&+test.stsRip>0?(+test.stsRip>15?100:+test.stsRip>=10?67:33):null;
  const hg=test?.handgrip&&+test.handgrip>0?+test.handgrip:null;
  let hgS=null;
  if(hg!==null){
    if(m){hgS=hg>=44?100:hg>=35?75:hg>=25?50:25;}
    else{hgS=hg>=28?100:hg>=20?75:hg>=14?50:25;}
  }
  let forzaScore=null,forzaVal='';
  if(stsS!==null&&hgS!==null){forzaScore=Math.round((stsS+hgS)/2);forzaVal='STS '+test.stsRip+' rip + HG '+hg+'kg';}
  else if(stsS!==null){forzaScore=stsS;forzaVal='STS '+test.stsRip+' rip';}
  else if(hgS!==null){forzaScore=hgS;forzaVal='HG '+hg+'kg';}
  if(forzaScore!==null) components.push({id:'forza',label:'Forza (STS + Handgrip)',w:30,score:forzaScore,val:forzaVal,icon:'üí™'});
  // 3. COMPOSIZIONE CORPOREA (peso 20%) ‚Äî FM%
  const fm=extra?.biaFM?+extra.biaFM:(test?.massaGrassa?+test.massaGrassa:(test?.biaFM?+test.biaFM:null));
  if(fm!==null&&fm>0){
    let cs;
    if(m){cs=fm<14?100:fm<=17?75:fm<=24?50:25;}
    else{cs=fm<21?100:fm<=24?75:fm<=31?50:25;}
    components.push({id:'corpo',label:'Composizione corporea (FM%)',w:20,score:cs,val:fm+'%',icon:'üìè'});
  }
  // 4. EQUILIBRIO (peso 10%) ‚Äî TUG
  if(test?.tugSec&&+test.tugSec>0){
    const t=+test.tugSec;
    const ts=t<10?100:t<=12?67:t<=20?33:0;
    components.push({id:'equilibrio',label:'Equilibrio (TUG)',w:10,score:ts,val:t+'s',icon:'‚è±'});
  }
  // Minimo: almeno 6MWT o STS
  if(components.length===0)return null;
  if(!components.find(c=>c.id==='aerobica')&&!components.find(c=>c.id==='forza'))return null;
  // Calcolo media pesata normalizzata
  const totalW=components.reduce((a,c)=>a+c.w,0);
  const score=Math.round(components.reduce((a,c)=>a+c.score*(c.w/totalW),0));
  // Componenti mancanti
  const allIds=['aerobica','forza','corpo','equilibrio'];
  const missing=allIds.filter(id=>!components.find(c=>c.id===id));
  const missingLabels={aerobica:'6MWT',forza:'STS o Handgrip',corpo:'FM% (BIA o plicometria)',equilibrio:'TUG'};
  // Risultato
  let code,l,c,bg;
  if(score>=70){code='C';l=gT().profileGood;c=C.green;bg='#d1fae5';}
  else if(score>=40){code='B';l=gT().profileMed;c=C.yellow;bg='#fef3c7';}
  else{code='A';l=gT().profileLow;c=C.red;bg='#fee2e2';}
  return{code,l,c,bg,score,components,missing:missing.map(id=>missingLabels[id])};
};

const profilo=(mwt,sts,sesso,test,extra)=>{
  // Chiamata legacy con solo mwt,sts ‚Üí costruisci test minimale
  const t=test||{mwtDist:mwt,stsRip:sts};

function StatCard({label,value,sub,color=C.blue,icon,delay}){
  var numVal=typeof value==='number'?value:parseInt(value,10);
  var isNum=!isNaN(numVal)&&typeof value==='number';
  var ref2=useRef(null);
  var counted=useRef(false);
  useEffect(function(){
    if(!isNum||counted.current||!ref2.current)return;
    counted.current=true;
    var start=0;var end=numVal;var duration=600;var startTime=null;
    function animate(ts){
      if(!startTime)startTime=ts;
      var progress=Math.min((ts-startTime)/duration,1);
      var current=Math.round(progress*end);
      if(ref2.current)ref2.current.textContent=current;
      if(progress<1)requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  },[numVal,isNum]);
  var dl=delay||0;
  return(
    <div style={{...S.kpi(color),background:'linear-gradient(135deg,'+color+'08,'+color+'15)',borderLeft:'3px solid '+color,animation:'fadeInUp .3s ease both',animationDelay:dl+'s'}}>
      {icon&&<div style={{position:'absolute',top:8,right:10,fontSize:32,opacity:0.15,lineHeight:1}}>{icon}</div>}
      <div style={{position:'absolute',top:0,right:0,width:44,height:44,borderRadius:'0 11px 0 44px',background:color+'15'}}/>
      <div style={{fontSize:10,color:C.muted,fontWeight:600,textTransform:'uppercase',letterSpacing:.8,marginBottom:5}}>{label}</div>
      <div ref={ref2} style={{fontSize:28,fontWeight:900,color:C.strong,lineHeight:1}}>{value}</div>
      {sub&&<div style={{fontSize:11,color:color,fontWeight:600,marginTop:3}}>{sub}</div>}
    </div>
  );
}

function SchedaModal({exercises,onSave,onClose}){
  const [form,setForm]=useState({nome:'',tipo:'Forza',data:fmtDate(),esercizi:[],note:''});

  return(
    <Modal title="Nuova scheda allenamento" onClose={onClose} width="660px">
      <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 1fr 1fr',gap:12,marginBottom:16}}>
        <FF label="Nome scheda" name="nome" value={form.nome} onChange={upd}/>
        <FF label="Tipo" name="tipo" value={form.tipo} onChange={upd} options={['Forza','Cardio','Funzionale','Mobilit√†','Full Body','Upper','Lower','HIIT']}/>
        <FF label="Data" name="data" value={form.data} onChange={upd}/>
      </div>
      <div style={{...S.card,marginBottom:14}}>
        <div style={S.st}>Aggiungi esercizio</div>
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr',gap:8,alignItems:'end'}}>
          <FF label="Esercizio" name="eId" value={addEx.eId} onChange={e=>setAddEx(f=>({...f,eId:e.target.value}))} options={[{v:'',l:'-- Scegli --'}].concat(exercises.map(e=>({v:e.id,l:e.nome+' ('+e.cat+')'})))}/>
          <FF label="Serie" name="serie" type="number" value={addEx.serie} onChange={e=>setAddEx(f=>({...f,serie:+e.target.value}))}/>
          <FF label="Rip." name="reps" type="number" value={addEx.reps} onChange={e=>setAddEx(f=>({...f,reps:+e.target.value}))}/>
          <FF label="Peso kg" name="peso" value={addEx.peso} onChange={e=>setAddEx(f=>({...f,peso:e.target.value}))}/>
          <FF label="Rec. (s)" name="rec" type="number" value={addEx.rec} onChange={e=>setAddEx(f=>({...f,rec:+e.target.value}))}/>
        </div>
        <button style={{...S.btn('success',true),marginTop:8}} onClick={()=>{if(addEx.eId){setForm(f=>({...f,esercizi:[...f.esercizi,{...addEx}]}));setAddEx({eId:'',serie:3,reps:12,peso:'',rec:60})}}}>+ Aggiungi</button>
      </div>
      {form.esercizi.length>0&&(
        <div style={{marginBottom:14}}>
          <div style={S.st}>Esercizi ({form.esercizi.length})</div>
          {form.esercizi.map((ex,i)=>{
            const info=exercises.find(e=>e.id===ex.eId);
            return(
              <div key={ex.eId+'-'+i} style={{...S.row,border:`1px solid ${C.border2}`,borderRadius:8,marginBottom:5}}>
                <span style={{fontSize:12,color:C.blue,fontWeight:700,minWidth:20}}>{i+1}</span>
                <span style={{flex:1,fontSize:13,color:C.strong}}>{info?.nome}</span>
                <span style={{fontSize:12,color:C.muted}}>{ex.serie}√ó{ex.reps}{ex.peso?` @ ${ex.peso}kg`:''} ¬∑ rec {ex.rec}s</span>
                <button style={{...S.btn('danger',true),padding:'2px 7px'}} onClick={()=>setForm(f=>({...f,esercizi:f.esercizi.filter((_,ii)=>ii!==i)}))}>‚úï</button>
              </div>
            );
          })}
        </div>
      )}
      <FF label="Note scheda" name="note" type="textarea" value={form.note} onChange={upd}/>
      <div style={{display:'flex',gap:8,marginTop:16,justifyContent:'flex-end'}}>

// ‚îÄ‚îÄ MAIN APP ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function App(){
  const [user,setUser]=useState(undefined);
  const [profile,setProfile]=useState(null);

  const loadProfile=async(u)=>{
    if(!u){setProfile(null);return;}
    const p=await fbGetUserProfile(u.uid);
    setProfile(p);
  };

  useEffect(()=>{
    let done=false;
    const timeout=setTimeout(()=>{if(!done){done=true;setUser(null);}},5000);
    try{
      const unsub=fbAuth.onAuthStateChanged(async u=>{
        if(!done){done=true;clearTimeout(timeout);}
        setUser(u);
        await loadProfile(u);
      });
      return()=>{clearTimeout(timeout);try{unsub();}catch(e){}};
    }catch(e){clearTimeout(timeout);setUser(null);}
  },[]);

  if(user===undefined) return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',background:'#07090f',gap:16}}>
      <div style={{fontSize:32,fontWeight:900,color:'#3b82f6'}}>PT Board</div>
      <div style={{width:36,height:36,border:'3px solid #334155',borderTop:'3px solid #3b82f6',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  if(!user) return <AuthScreen onProfileReady={p=>setProfile(p)}/>;
  if(profile?.plan==='blocked') return <PaywallScreen user={user} profile={profile} blocked/>;
  if(isTrialExpired(profile)) return <PaywallScreen user={user} profile={profile}/>;
  return <AppInner user={user} profile={profile} trialLeft={trialDaysLeft(profile)}/>;
}

  const [syncing,setSyncing]=useState(true);
  const [,forceUpdate]=useState(0);

  // Responsive isMobile
  useEffect(()=>{

      const m=window.innerWidth<=768;

    window.addEventListener('orientationchange',onResize);

function ScoreBar({score,color,height}){
  const h=height||14;
  return(
    <div style={{width:'100%',background:C.border+'40',borderRadius:h/2,height:h,overflow:'hidden'}}>
      <div style={{width:score+'%',height:'100%',background:color||C.blue,borderRadius:h/2,transition:'width .4s ease'}}/>
    </div>
  );
}

function ScoreBreakdown({pr,compact}){
  if(!pr)return null;
  return(
    <div style={{display:'flex',flexDirection:'column',gap:compact?6:10}}>
      {pr.components.map(comp=>{
        const barC=comp.score>=70?C.green:comp.score>=40?C.yellow:C.red;
        return(
          <div key={comp.id}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
              <div style={{fontSize:compact?11:12,fontWeight:600,color:C.text}}>{comp.icon} {comp.label}</div>
              <div style={{fontSize:compact?10:11,color:C.muted}}>{comp.val} ‚Äî <span style={{fontWeight:700,color:barC}}>{comp.score}/100</span> (peso {comp.w}%)</div>
            </div>
            <ScoreBar score={comp.score} color={barC} height={compact?8:10}/>
          </div>
        );
      })}
      {pr.missing&&pr.missing.length>0&&(
        <div style={{background:C.yellow+'12',border:'1px solid '+C.yellow+'30',borderRadius:8,padding:'8px 12px',marginTop:2}}>
          <div style={{fontSize:11,fontWeight:700,color:C.yellow}}>Dati mancanti per uno score piu preciso:</div>
          <div style={{fontSize:11,color:C.muted,marginTop:3}}>{pr.missing.join(', ')}</div>
        </div>
      )}
    </div>
  );
}

                {d.mobCaviglia&&d.mobCaviglia!=='Ottima'&&d.mobCaviglia!=='Buona'&&<InterpBox interp={interpMobCaviglia(d.mobCaviglia==='Ridotta'?8:d.mobCaviglia==='Molto limitata'?5:12)} icon="ü¶∂"/>}

            {/* Sezione: Pianificazione */}

          {/* STEP 2 ‚Äî Composizione & BIA */}

              <div style={{fontSize:12,color:C.muted,lineHeight:1.5}}>Dati opzionali ‚Äî compila solo le sezioni per cui hai strumenti disponibili. Salta il resto.</div>

            <div style={{background:C.bg,border:'1px solid '+C.border2,borderRadius:14,padding:'14px 16px',borderLeft:'4px solid '+C.blue}}>

                <span style={{fontSize:16}}>üìè</span>

              <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 1fr',gap:'0 12px'}}>

                <WizIn lbl="Coscia dx (cm)" name="cirCoscia" type="number" val={d.cirCoscia} ph="es. 55" onChange={upd('cirCoscia')}/>
                <WizIn lbl="Polpaccio dx (cm)" name="cirPolpaccio" type="number" val={d.cirPolpaccio} ph="es. 37" onChange={upd('cirPolpaccio')}/>

              {d.vita&&d.fianchi&&<div style={{marginTop:8,background:C.card,borderRadius:8,padding:'8px 12px'}}>
                {(()=>{const ratio=(+d.vita/+d.fianchi).toFixed(2);const alto=d.sesso==='M'?ratio>0.9:ratio>0.85;return<div style={{fontSize:12,fontWeight:700,color:alto?C.red:C.green}}>Rapporto vita/fianchi: {ratio} ‚Äî {alto?'Rischio CV elevato':'Nella norma'}</div>})()}

            </div>

            {/* Plicometria */}
            <div style={{background:C.bg,border:'1px solid '+C.border2,borderRadius:14,padding:'14px 16px',borderLeft:'4px solid '+C.orange}}>

              </div>

              <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 1fr',gap:'0 12px'}}>
                <WizIn lbl="R ‚Äî Resistenza (ohm)" name="biaR" type="number" val={d.biaR} ph="es. 520"

                <WizIn lbl="Xc ‚Äî Reattanza (ohm)" name="biaXc" type="number" val={d.biaXc} ph="es. 62"

                <WizIn lbl="PhA ‚Äî Angolo di fase" name="biaPhA" type="number" val={d.biaPhA} ph="es. 6.8"

                <WizIn lbl="FFM ‚Äî Massa magra (kg)" name="biaFFM" type="number" val={d.biaFFM} ph="es. 62"

                <WizIn lbl="FM ‚Äî Massa grassa (%)" name="biaFM" type="number" val={d.biaFM} ph="es. 22"

                  {(Math.atan(+d.biaXc/+d.biaR)*(180/Math.PI))>=5&&(Math.atan(+d.biaXc/+d.biaR)*(180/Math.PI))<=8
                    ?'Nella norma (5-8)'
                    :(Math.atan(+d.biaXc/+d.biaR)*(180/Math.PI))<5?'Sotto norma ‚Äî valutare stato nutrizionale'
                    :'Sopra norma ‚Äî ottima integrita cellulare'}

              {/* Stima predittiva */}

                    if(!peso||!alt)return alert('Inserire altezza e peso nel passo 1');
                    const bmiV=peso/((alt/100)**2);
                    const fmPct=m
                      ?(1.20*bmiV)+(0.23*age)-16.2
                      :(1.20*bmiV)+(0.23*age)-5.4;
                    const fmKg=peso*(fmPct/100);
                    const ffm=peso-fmKg;
                    const tbw=m
                      ?2.447-(0.09156*age)+(0.1074*alt)+(0.3362*peso)
                      :-2.097+(0.1069*alt)+(0.2466*peso);
                    const bmr=m
                      ?10*peso+6.25*alt-5*age+5
                      :10*peso+6.25*alt-5*age-161;
                    setD(x=>({...x,
                      biaFM:fmPct.toFixed(1),
                      biaFFM:ffm.toFixed(1),
                      biaTBW:tbw.toFixed(1),
                      biaBMR:Math.round(bmr),
                    }));
                  }}>

                </div>}

                  <div style={{fontSize:12,color:C.text,lineHeight:1.5}}>{t}</div>
                </div>

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  render(){
    if(this.state.err) return(
      <div style={{padding:24,background:'#07090f',minHeight:'100vh',color:'#e2e8f0',fontFamily:'monospace'}}>
        <div style={{fontSize:20,fontWeight:700,color:'#ef4444',marginBottom:12}}>‚ö† Errore app</div>
        <div style={{fontSize:12,color:'#94a3b8',wordBreak:'break-all',whiteSpace:'pre-wrap'}}>{String(this.state.err)}</div>
        <button onClick={()=>window.location.reload()} style={{marginTop:20,padding:'10px 20px',background:'#3b82f6',color:'#fff',border:'none',borderRadius:8,fontSize:14,cursor:'pointer'}}>Ricarica</button>

    );
    return this.props.children;
  }
}

}

function AuthScreen({onProfileReady}){
  const [mode,setMode]=useState('login');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [pw2,setPw2]=useState('');
  const [nome,setNome]=useState('');
  const [err,setErr]=useState('');
  const [msg,setMsg]=useState('');
  const [loading,setLoading]=useState(false);

  const errMap=(code)=>{
    if(code==='auth/user-not-found'||code==='auth/wrong-password'||code==='auth/invalid-credential') return 'Email o password errati';
    if(code==='auth/email-already-in-use') return 'Email gi√† registrata';
    if(code==='auth/weak-password') return 'Password troppo corta (minimo 6 caratteri)';
    if(code==='auth/invalid-email') return 'Email non valida';
    return 'Errore. Riprova.';
  };

  const doLogin=async()=>{setErr('');setLoading(true);try{await fbAuth.signInWithEmailAndPassword(email,pw);}catch(e){setErr(errMap(e.code));}setLoading(false);};
  const doRegister=async()=>{setErr('');if(pw!==pw2){setErr('Le password non coincidono');return;}if(!nome.trim()){setErr('Inserisci il tuo nome');return;}setLoading(true);try{const c=await fbAuth.createUserWithEmailAndPassword(email,pw);await c.user.updateProfile({displayName:nome});const profile={email,displayName:nome,plan:'trial',trialStart:Date.now(),createdAt:Date.now()};await fbSaveUserProfile(c.user.uid,profile);if(onProfileReady)onProfileReady(profile);}catch(e){setErr(errMap(e.code));}setLoading(false);};
  const doReset=async()=>{setErr('');setLoading(true);try{await fbAuth.sendPasswordResetEmail(email);setMsg('Email di recupero inviata!');}catch(e){setErr(errMap(e.code));}setLoading(false);};

  const inp={width:'100%',padding:'11px 14px',borderRadius:9,border:'1px solid #334155',background:'#0f172a',color:'#e2e8f0',fontSize:14,fontFamily:'inherit',outline:'none',marginBottom:10};
  const btn={width:'100%',padding:'12px',borderRadius:9,border:'none',background:'#3b82f6',color:'#fff',fontSize:14,fontWeight:700,cursor:loading?'not-allowed':'pointer',fontFamily:'inherit',marginBottom:8,opacity:loading?0.6:1};

  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'#07090f',padding:20}}>
      <div style={{width:'100%',maxWidth:400}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{fontSize:32,fontWeight:900,color:'#3b82f6',marginBottom:6}}>PT Board</div>
          <div style={{fontSize:13,color:'#64748b'}}>Gestione pazienti per Personal Trainer</div>
        </div>
        <div style={{background:'#0f1623',border:'1px solid #1e2d47',borderRadius:14,padding:28}}>
          {mode!=='reset'&&(
            <div style={{display:'flex',gap:4,background:'#080d1a',borderRadius:9,padding:4,marginBottom:22}}>
              {[['login','Accedi'],['register','Registrati']].map(([m,l])=>(
                <button key={m} onClick={()=>{setMode(m);setErr('');setMsg('');}} style={{flex:1,padding:'8px',borderRadius:7,border:'none',background:mode===m?'#3b82f6':'transparent',color:mode===m?'#fff':'#64748b',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit',transition:'all .2s'}}>{l}</button>
              ))}
            </div>
          )}
          {mode==='reset'&&(
            <div style={{marginBottom:16}}>
              <button onClick={()=>{setMode('login');setErr('');setMsg('');}} style={{background:'none',border:'none',color:'#64748b',cursor:'pointer',fontSize:13,fontFamily:'inherit',padding:0}}>‚Üê Torna al login</button>
              <div style={{fontSize:18,fontWeight:800,color:'#f8fafc',marginTop:8}}>Recupera password</div>
            </div>
          )}
          {mode==='register'&&<input style={inp} placeholder="Il tuo nome" value={nome} onChange={e=>setNome(e.target.value)}/>}
          <input style={inp} placeholder="Email" type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&(mode==='login'?doLogin():mode==='register'?doRegister():doReset())}/>
          {mode!=='reset'&&<input style={inp} placeholder="Password" type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&(mode==='login'?doLogin():doRegister())}/>}
          {mode==='register'&&<input style={inp} placeholder="Conferma password" type="password" value={pw2} onChange={e=>setPw2(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doRegister()}/>}
          {err&&<div style={{background:'#ef444415',border:'1px solid #ef444430',borderRadius:8,padding:'9px 13px',fontSize:12,color:'#ef4444',marginBottom:10}}>{err}</div>}
          {msg&&<div style={{background:'#10b98115',border:'1px solid #10b98130',borderRadius:8,padding:'9px 13px',fontSize:12,color:'#10b981',marginBottom:10}}>{msg}</div>}
          {mode==='login'&&<button style={btn} onClick={doLogin} disabled={loading}>{loading?'Accesso...':'Accedi'}</button>}
          {mode==='register'&&<button style={btn} onClick={doRegister} disabled={loading}>{loading?'Registrazione...':'Crea account'}</button>}
          {mode==='reset'&&<button style={btn} onClick={doReset} disabled={loading}>{loading?'Invio...':'Invia email di recupero'}</button>}
          {mode==='login'&&<button onClick={()=>{setMode('reset');setErr('');setMsg('');}} style={{width:'100%',background:'none',border:'none',color:'#64748b',cursor:'pointer',fontSize:12,fontFamily:'inherit',textAlign:'center',padding:'4px 0'}}>Password dimenticata?</button>}
        </div>
        <div style={{textAlign:'center',marginTop:20,fontSize:11,color:'#334155'}}>Dati salvati in modo sicuro su Google Firebase üîí</div>
      </div>
    </div>
  );
}

          <button onClick={onClose} style={{padding:'8px 18px',borderRadius:8,border:'1px solid '+C.border2,background:'transparent',color:C.muted,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>Chiudi</button>
          <div style={{display:'flex',gap:8}}>
            {cur>0&&<button onClick={()=>setCur(c=>c-1)} style={{padding:'8px 18px',borderRadius:8,border:'1px solid '+C.border2,background:'transparent',color:C.muted,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>{gT().wPrev}</button>}
            {cur<total-1
              ?<button onClick={()=>setCur(c=>c+1)} style={{padding:'8px 18px',borderRadius:8,border:'none',background:C.blue,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>{gT().wNext}</button>
              :<button onClick={onClose} style={{padding:'8px 18px',borderRadius:8,border:'none',background:C.green,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>‚úì Inizia ad usare PT Board</button>
            }
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
